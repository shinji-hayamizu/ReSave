<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>完了日時表示パターン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }

    /* アコーディオン */
    .answer-body { display: none; }
    .answer-body.open { display: block; }
  </style>
</head>
<body class="bg-gray-100 py-10 px-4">

  <div class="max-w-lg mx-auto space-y-12">

    <!-- ========== パターンA ========== -->
    <section>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Pattern A — ヘッダー右端（バッジ左隣）</p>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">

        <!-- ヘッダー -->
        <div class="flex items-center justify-between gap-3 px-4 py-3 bg-gray-50 border-b border-gray-100">
          <!-- 左: 覚え直しボタン -->
          <button class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-sm font-medium bg-amber-500/10 text-amber-600 hover:bg-amber-500 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            <span class="font-semibold">覚え直し</span>
          </button>
          <!-- 右: 完了日 + ステップバッジ -->
          <div class="flex items-center gap-2">
            <!-- ★ 完了日時 -->
            <span class="flex items-center gap-1 text-xs text-gray-400">
              <svg class="w-3 h-3 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              2026/4/2
            </span>
            <span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-xs font-medium text-gray-500">1/6</span>
          </div>
        </div>

        <!-- 問題文 -->
        <div class="px-5 py-4">
          <div class="flex items-start justify-between gap-3">
            <p class="text-base text-gray-800 leading-relaxed flex-1">E to E とは？</p>
            <button class="text-gray-300 hover:text-gray-500 transition-colors mt-0.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
          </div>
        </div>

        <!-- 答えを見るボタン -->
        <div class="flex justify-center py-3 bg-white border-t border-gray-50">
          <button onclick="this.closest('.bg-white').querySelector('.answer-body').classList.toggle('open'); this.querySelector('span').textContent = this.closest('.bg-white').querySelector('.answer-body').classList.contains('open') ? '答えを隠す' : '答えを見る';"
            class="inline-flex items-center gap-2 px-6 h-9 rounded-full text-sm font-semibold bg-blue-500 text-white hover:bg-blue-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <span>答えを見る</span>
          </button>
        </div>

        <!-- 答え（折りたたみ） -->
        <div class="answer-body">
          <div class="px-5 py-4 bg-white">
            <div class="inline-block px-4 py-3 bg-amber-50 border border-amber-200 rounded-lg">
              <p class="text-base text-gray-800 leading-relaxed">End-to-End の略。ユーザー体験全体を通して評価・テストすること。</p>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- ========== パターンB ========== -->
    <section>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Pattern B — カード下部（フッター）</p>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">

        <!-- ヘッダー -->
        <div class="flex items-center justify-between gap-3 px-4 py-3 bg-gray-50 border-b border-gray-100">
          <button class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-sm font-medium bg-amber-500/10 text-amber-600 hover:bg-amber-500 hover:text-white transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            <span class="font-semibold">覚え直し</span>
          </button>
          <span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-xs font-medium text-gray-500">1/6</span>
        </div>

        <!-- 問題文 -->
        <div class="px-5 py-4">
          <div class="flex items-start justify-between gap-3">
            <p class="text-base text-gray-800 leading-relaxed flex-1">E to E とは？</p>
            <button class="text-gray-300 hover:text-gray-500 transition-colors mt-0.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
          </div>
        </div>

        <!-- 答えを見るボタン -->
        <div class="flex justify-center py-3 bg-white border-t border-gray-50">
          <button onclick="this.closest('.bg-white.rounded-xl').querySelector('.answer-body').classList.toggle('open'); this.querySelector('span').textContent = this.closest('.bg-white.rounded-xl').querySelector('.answer-body').classList.contains('open') ? '答えを隠す' : '答えを見る';"
            class="inline-flex items-center gap-2 px-6 h-9 rounded-full text-sm font-semibold bg-blue-500 text-white hover:bg-blue-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <span>答えを見る</span>
          </button>
        </div>

        <!-- 答え -->
        <div class="answer-body">
          <div class="px-5 py-4 bg-white">
            <div class="inline-block px-4 py-3 bg-amber-50 border border-amber-200 rounded-lg">
              <p class="text-base text-gray-800 leading-relaxed">End-to-End の略。ユーザー体験全体を通して評価・テストすること。</p>
            </div>
          </div>
        </div>

        <!-- ★ フッター: 完了日時 -->
        <div class="px-4 py-2 flex items-center justify-end gap-1.5">
          <svg class="w-3 h-3 text-green-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
          <span class="text-xs text-gray-400">完了日: 2026/04/02</span>
        </div>
      </div>
    </section>

    <!-- ========== パターンC ========== -->
    <section>
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Pattern C — 「覚え直し」ボタン右隣</p>
      <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-gray-100">

        <!-- ヘッダー -->
        <div class="flex items-center justify-between gap-3 px-4 py-3 bg-gray-50 border-b border-gray-100">
          <!-- 左: ボタン + 完了日 -->
          <div class="flex items-center gap-2">
            <button class="flex items-center gap-1.5 px-3.5 py-2 rounded-lg text-sm font-medium bg-amber-500/10 text-amber-600 hover:bg-amber-500 hover:text-white transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
              <span class="font-semibold">覚え直し</span>
            </button>
            <!-- ★ 完了日時 -->
            <span class="flex items-center gap-1 text-xs text-gray-400">
              <svg class="w-3 h-3 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
              完了: 4/2
            </span>
          </div>
          <!-- 右: ステップバッジ -->
          <span class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-gray-100 text-xs font-medium text-gray-500">1/6</span>
        </div>

        <!-- 問題文 -->
        <div class="px-5 py-4">
          <div class="flex items-start justify-between gap-3">
            <p class="text-base text-gray-800 leading-relaxed flex-1">E to E とは？</p>
            <button class="text-gray-300 hover:text-gray-500 transition-colors mt-0.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
            </button>
          </div>
        </div>

        <!-- 答えを見るボタン -->
        <div class="flex justify-center py-3 bg-white border-t border-gray-50">
          <button onclick="var ab = this.closest('.overflow-hidden').querySelector('.answer-body'); ab.classList.toggle('open'); this.querySelector('span').textContent = ab.classList.contains('open') ? '答えを隠す' : '答えを見る';"
            class="inline-flex items-center gap-2 px-6 h-9 rounded-full text-sm font-semibold bg-blue-500 text-white hover:bg-blue-600 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
            <span>答えを見る</span>
          </button>
        </div>

        <!-- 答え -->
        <div class="answer-body">
          <div class="px-5 py-4 bg-white">
            <div class="inline-block px-4 py-3 bg-amber-50 border border-amber-200 rounded-lg">
              <p class="text-base text-gray-800 leading-relaxed">End-to-End の略。ユーザー体験全体を通して評価・テストすること。</p>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>
</body>
</html>
