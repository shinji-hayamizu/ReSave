<!--
  @screen: タグ管理画面
  @path: /tags
  @feature: F-017 タグ管理
  @spec: docs/requirements/functions/tag/F-017-tag-management.md

  @description:
    ユーザーが作成したタグの一覧表示・作成・編集・削除を行う画面。
    タグにはカラーを設定でき、カードの分類・整理に使用する。

  @api:
    - GET /api/tags - タグ一覧取得（カード数含む）
    - POST /api/tags - タグ作成
    - PATCH /api/tags/:id - タグ更新
    - DELETE /api/tags/:id - タグ削除

  @state:
    - tags: Tag[] - タグ一覧データ
    - isFormModalOpen: boolean - 作成/編集モーダルの開閉状態
    - isDeleteModalOpen: boolean - 削除確認モーダルの開閉状態
    - formMode: 'create' | 'edit' - モーダルのモード
    - selectedTag: Tag | null - 編集/削除対象のタグ
    - formData: { name: string, color: TagColor } - フォーム入力値
    - errors: { tagName?: string } - バリデーションエラー

  @types:
    Tag: { id: string, name: string, color: TagColor, card_count: number }
    TagColor: 'blue' | 'green' | 'purple' | 'orange' | 'pink' | 'cyan' | 'yellow' | 'gray'

  @hooks:
    - useTags() - タグ一覧取得 (TanStack Query)
    - useCreateTag() - タグ作成 mutation
    - useUpdateTag() - タグ更新 mutation
    - useDeleteTag() - タグ削除 mutation

  @navigation:
    - from: サイドバー「タグ」リンク
    - to: なし（モーダル操作のみ）
-->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ========================================
       Tag Management Specific Styles
       ======================================== */

    /* Page Header */
    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 0 16px;
    }

    .page-header__title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Tag List */
    .tag-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Tag Item */
    .tag-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition-fast);
    }

    .tag-item:hover {
      box-shadow: var(--shadow-md);
    }

    .tag-item__chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 9999px;
      white-space: nowrap;
    }

    .tag-item__info {
      flex: 1;
      min-width: 0;
    }

    .tag-item__name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 2px;
    }

    .tag-item__count {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .tag-item__actions {
      display: flex;
      gap: 4px;
    }

    .tag-item__action {
      width: 36px;
      height: 36px;
      border: none;
      background: var(--bg-secondary);
      border-radius: var(--border-radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .tag-item__action:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .tag-item__action--danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .tag-item__action svg {
      width: 18px;
      height: 18px;
    }

    /* Empty State */
    .tag-list__empty {
      text-align: center;
      padding: 64px 20px;
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-sm);
    }

    .tag-list__empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      color: var(--text-muted);
    }

    .tag-list__empty-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .tag-list__empty-text {
      font-size: 14px;
      color: var(--text-secondary);
    }

    /* Modal Overlay */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.active {
      display: flex;
    }

    /* Modal */
    .modal {
      width: 100%;
      max-width: 400px;
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .modal__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      border-bottom: 1px solid var(--border-color);
    }

    .modal__title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal__close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      border-radius: var(--border-radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all var(--transition-fast);
    }

    .modal__close:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .modal__close svg {
      width: 20px;
      height: 20px;
    }

    .modal__body {
      padding: 24px;
    }

    .modal__footer {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }

    /* Color Palette */
    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border: 2px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      transition: all var(--transition-fast);
      position: relative;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.selected {
      border-color: var(--text-primary);
    }

    .color-option.selected::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
    }

    /* Tag Color Variants */
    .tag-color--blue {
      background: #e0f2fe;
      color: #0369a1;
      border: 1px solid #bae6fd;
    }

    .tag-color--green {
      background: #dcfce7;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

    .tag-color--purple {
      background: #f3e8ff;
      color: #7c3aed;
      border: 1px solid #e9d5ff;
    }

    .tag-color--orange {
      background: #ffedd5;
      color: #c2410c;
      border: 1px solid #fed7aa;
    }

    .tag-color--pink {
      background: #fce7f3;
      color: #be185d;
      border: 1px solid #fbcfe8;
    }

    .tag-color--cyan {
      background: #cffafe;
      color: #0e7490;
      border: 1px solid #a5f3fc;
    }

    .tag-color--yellow {
      background: #fef9c3;
      color: #a16207;
      border: 1px solid #fde047;
    }

    .tag-color--gray {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
    }

    /* Color option backgrounds */
    .color-swatch--blue { background: #0369a1; }
    .color-swatch--green { background: #15803d; }
    .color-swatch--purple { background: #7c3aed; }
    .color-swatch--orange { background: #c2410c; }
    .color-swatch--pink { background: #be185d; }
    .color-swatch--cyan { background: #0e7490; }
    .color-swatch--yellow { background: #a16207; }
    .color-swatch--gray { background: #475569; }

    /* Delete Modal */
    .modal__message {
      font-size: 15px;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .modal__warning {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: #fef9c3;
      border: 1px solid #fde047;
      border-radius: var(--border-radius);
      font-size: 13px;
      color: #92400e;
    }

    .modal__warning svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Character Counter */
    .form-input-wrapper {
      position: relative;
    }

    .form-input-counter {
      position: absolute;
      right: 12px;
      bottom: 12px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .form-input-counter--warning {
      color: var(--color-warning);
    }

    .form-input-counter--error {
      color: var(--color-danger);
    }
  </style>
</head>
<body class="content-body">

  <!--
    @component: TagManagementPage
    @type: Page Component (Server Component with Client boundaries)
    @path: app/(main)/tags/page.tsx

    @props: none (fetches data internally)

    @state:
      - isFormModalOpen: boolean - useState(false)
      - isDeleteModalOpen: boolean - useState(false)
      - formMode: 'create' | 'edit' - useState('create')
      - selectedTag: Tag | null - useState(null)

    @data-fetching:
      - useTags() から tags を取得
      - isLoading, isError 状態のハンドリング必要

    @handlers:
      - openCreateModal: () => { setFormMode('create'); setSelectedTag(null); setIsFormModalOpen(true) }
      - openEditModal: (tag: Tag) => { setFormMode('edit'); setSelectedTag(tag); setIsFormModalOpen(true) }
      - openDeleteModal: (tag: Tag) => { setSelectedTag(tag); setIsDeleteModalOpen(true) }
      - closeFormModal: () => setIsFormModalOpen(false)
      - closeDeleteModal: () => setIsDeleteModalOpen(false)
  -->
  <div class="content-wrapper" data-component="TagManagementPage">

    <!--
      @section: Page Header
      @contains: タイトル + タグ追加ボタン
    -->
    <div class="page-header">
      <h1 class="page-header__title">タグ管理</h1>
      <!--
        @event: onClick
        @handler: openCreateModal()
        @action: 作成モーダルを開く（formMode='create', selectedTag=null）
      -->
      <button
        class="btn btn--primary"
        data-action="onClick:openCreateModal"
      >
        <svg class="btn__icon" data-icon="lucide:Plus" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        タグ追加
      </button>
    </div>

    <!--
      @component: TagList
      @type: Client Component
      @path: components/tags/TagList.tsx

      @props:
        - tags: Tag[] - タグ一覧データ
        - onEdit: (tag: Tag) => void - 編集ボタンクリック時
        - onDelete: (tag: Tag) => void - 削除ボタンクリック時

      @api: GET /api/tags
      @response: { data: Tag[], pagination: { total, limit, offset } }

      @conditional-render:
        - tags.length > 0: タグ一覧を表示
        - tags.length === 0: 空状態を表示

      @iteration:
        - tags.map((tag) => <TagItem key={tag.id} ... />)
    -->
    <div class="tag-list" data-component="TagList" data-list="tags">

      <!--
        @component: TagItem
        @type: Client Component
        @path: components/tags/TagItem.tsx

        @props:
          - tag: Tag - { id, name, color, card_count }
          - onEdit: () => void - 編集クリック時のコールバック
          - onDelete: () => void - 削除クリック時のコールバック

        @note: このブロックは tags.map() でレンダリング
      -->
      <!-- [Sample 1: 英語] -->
      <div
        class="tag-item"
        data-component="TagItem"
        data-list-item
        data-key="tagId"
        data-props="tag,onEdit,onDelete"
      >
        <!-- @prop: tag.color -> tag-color--{color} クラスを動的に適用 -->
        <span class="tag-item__chip tag-color--blue" data-prop="tagColor">英語</span>
        <div class="tag-item__info">
          <!-- @prop: tag.name -->
          <div class="tag-item__name" data-prop="tagName">英語</div>
          <!-- @prop: tag.card_count -->
          <div class="tag-item__count"><span data-prop="cardCount">15</span>枚のカード</div>
        </div>
        <div class="tag-item__actions">
          <!--
            @event: onClick
            @handler: onEdit(tag)
            @action: 編集モーダルを開く
          -->
          <button
            class="tag-item__action"
            title="編集"
            data-action="onClick:onEdit"
          >
            <svg data-icon="lucide:Edit" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          </button>
          <!--
            @event: onClick
            @handler: onDelete(tag)
            @action: 削除確認モーダルを開く
          -->
          <button
            class="tag-item__action tag-item__action--danger"
            title="削除"
            data-action="onClick:onDelete"
          >
            <svg data-icon="lucide:Trash2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </div>
      <!-- [/TagItem] -->

      <!-- [Sample 2: TOEIC] - 同様のTagItemコンポーネント -->
      <div class="tag-item" data-list-item data-key="tagId">
        <span class="tag-item__chip tag-color--green">TOEIC</span>
        <div class="tag-item__info">
          <div class="tag-item__name">TOEIC</div>
          <div class="tag-item__count">8枚のカード</div>
        </div>
        <div class="tag-item__actions">
          <button class="tag-item__action" title="編集">
            <svg data-icon="lucide:Edit" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          </button>
          <button class="tag-item__action tag-item__action--danger" title="削除">
            <svg data-icon="lucide:Trash2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </div>

      <!-- [Sample 3: プログラミング] - 同様のTagItemコンポーネント -->
      <div class="tag-item" data-list-item data-key="tagId">
        <span class="tag-item__chip tag-color--purple">プログラミング</span>
        <div class="tag-item__info">
          <div class="tag-item__name">プログラミング</div>
          <div class="tag-item__count">23枚のカード</div>
        </div>
        <div class="tag-item__actions">
          <button class="tag-item__action" title="編集">
            <svg data-icon="lucide:Edit" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          </button>
          <button class="tag-item__action tag-item__action--danger" title="削除">
            <svg data-icon="lucide:Trash2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </div>

      <!-- [Sample 4: 日本史] - 同様のTagItemコンポーネント -->
      <div class="tag-item" data-list-item data-key="tagId">
        <span class="tag-item__chip tag-color--orange">日本史</span>
        <div class="tag-item__info">
          <div class="tag-item__name">日本史</div>
          <div class="tag-item__count">5枚のカード</div>
        </div>
        <div class="tag-item__actions">
          <button class="tag-item__action" title="編集">
            <svg data-icon="lucide:Edit" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
          </button>
          <button class="tag-item__action tag-item__action--danger" title="削除">
            <svg data-icon="lucide:Trash2" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
          </button>
        </div>
      </div>

      <!--
        @conditional: tags.length === 0
        @component: EmptyState
        @note: タグが0件の場合に表示
      -->
      <div class="tag-list__empty" data-state="empty" data-show-if="tags.length === 0" style="display: none;">
        <svg class="tag-list__empty-icon" data-icon="lucide:Tags" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 5 6.3 6.3a2.4 2.4 0 0 1 0 3.4L17 19"/><path d="M9.586 5.586A2 2 0 0 0 8.172 5H3a1 1 0 0 0-1 1v5.172a2 2 0 0 0 .586 1.414L8.29 18.29a2.426 2.426 0 0 0 3.42 0l3.58-3.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="6.5" cy="9.5" r=".5" fill="currentColor"/></svg>
        <p class="tag-list__empty-title">タグがありません</p>
        <p class="tag-list__empty-text">タグを作成して、カードを整理しましょう</p>
      </div>

    </div>
    <!-- [/TagList] -->

  </div>
  <!-- [/TagManagementPage] -->


  <!--
    @component: TagFormModal
    @type: Client Component
    @path: components/tags/TagFormModal.tsx

    @props:
      - isOpen: boolean - モーダルの開閉状態
      - mode: 'create' | 'edit' - 作成モード or 編集モード
      - tag: Tag | null - 編集時は既存タグデータ、作成時はnull
      - onSave: (data: { name: string, color: TagColor }) => void - 保存時コールバック
      - onClose: () => void - 閉じる時コールバック

    @state:
      - name: string - useState(tag?.name ?? '')
      - color: TagColor - useState(tag?.color ?? 'blue')
      - errors: { name?: string } - バリデーションエラー

    @api:
      - mode='create': POST /api/tags { name, color }
      - mode='edit': PATCH /api/tags/:id { name, color }

    @mutation:
      - useCreateTag() - 作成時
      - useUpdateTag() - 更新時

    @validation:
      - name: 必須、1-30文字
      - color: TagColor型のいずれか

    @conditional-render:
      - isOpen === false: null を返す（非表示）
      - mode === 'create': タイトル「タグを追加」
      - mode === 'edit': タイトル「タグを編集」
  -->
  <div
    class="modal-overlay"
    id="tag-form-modal"
    data-component="TagFormModal"
    data-props="isOpen,mode,tag,onSave,onClose"
  >
    <div class="modal" role="dialog" aria-labelledby="modal-title" aria-modal="true">
      <div class="modal__header">
        <!--
          @conditional: mode === 'create' ? 'タグを追加' : 'タグを編集'
        -->
        <h2 class="modal__title" id="modal-title" data-prop="modalTitle">タグを追加</h2>
        <!--
          @event: onClick
          @handler: onClose()
        -->
        <button
          class="modal__close"
          title="閉じる"
          data-action="onClick:onClose"
        >
          <svg data-icon="lucide:X" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <!--
          @event: onSubmit
          @handler: handleSave(e)
          @action: e.preventDefault() してバリデーション後に onSave を呼ぶ
        -->
        <form data-action="onSubmit:handleSave">
          <!-- @section: タグ名入力 -->
          <div class="form-group">
            <label class="form-label" for="tag-name">タグ名</label>
            <div class="form-input-wrapper">
              <!--
                @state: name
                @event: onChange
                @handler: setName(e.target.value)
                @validation: 必須、最大30文字
              -->
              <input
                type="text"
                id="tag-name"
                class="form-input"
                placeholder="タグ名を入力"
                maxlength="30"
                data-prop="tagName"
                data-action="onChange:setTagName"
              >
              <!-- @computed: `${name.length}/30` -->
              <span class="form-input-counter" data-prop="charCount">0/30</span>
            </div>
            <!--
              @conditional: errors.name が存在する場合に表示
            -->
            <p class="form-error" data-state="error" data-show-if="errors.tagName" style="display: none;">タグ名を入力してください</p>
          </div>

          <!-- @section: カラー選択 -->
          <div class="form-group">
            <label class="form-label">色</label>
            <!--
              @component: ColorPalette (インライン実装可)
              @state: color
              @colors: blue, green, purple, orange, pink, cyan, yellow, gray
            -->
            <div class="color-palette" data-prop="selectedColor">
              <!--
                @iteration: colors.map で生成可能
                @selected-class: color === 'blue' ? 'selected' : ''
                @event: onClick
                @handler: setColor('blue')
              -->
              <button
                type="button"
                class="color-option color-swatch--blue selected"
                data-color="blue"
                data-action="onClick:setColor('blue')"
                title="青"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--green"
                data-color="green"
                data-action="onClick:setColor('green')"
                title="緑"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--purple"
                data-color="purple"
                data-action="onClick:setColor('purple')"
                title="紫"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--orange"
                data-color="orange"
                data-action="onClick:setColor('orange')"
                title="オレンジ"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--pink"
                data-color="pink"
                data-action="onClick:setColor('pink')"
                title="ピンク"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--cyan"
                data-color="cyan"
                data-action="onClick:setColor('cyan')"
                title="シアン"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--yellow"
                data-color="yellow"
                data-action="onClick:setColor('yellow')"
                title="黄"
              ></button>
              <button
                type="button"
                class="color-option color-swatch--gray"
                data-color="gray"
                data-action="onClick:setColor('gray')"
                title="グレー"
              ></button>
            </div>
          </div>
        </form>
      </div>
      <!-- @section: フッターボタン -->
      <div class="modal__footer">
        <!--
          @event: onClick
          @handler: onClose()
        -->
        <button
          class="btn btn--secondary"
          data-action="onClick:onClose"
        >
          キャンセル
        </button>
        <!--
          @event: onClick
          @handler: handleSave()
          @action: バリデーション成功時に mutation 実行、成功後 onClose()
          @loading: mutation.isPending 時は disabled + ローディング表示
        -->
        <button
          class="btn btn--primary"
          data-action="onClick:handleSave"
        >
          保存
        </button>
      </div>
    </div>
  </div>
  <!-- [/TagFormModal] -->


  <!--
    @component: DeleteConfirmModal
    @type: Client Component
    @path: components/tags/DeleteConfirmModal.tsx

    @props:
      - isOpen: boolean - モーダルの開閉状態
      - tag: Tag | null - 削除対象のタグ
      - onConfirm: () => void - 削除実行時コールバック
      - onClose: () => void - 閉じる時コールバック

    @api: DELETE /api/tags/:id

    @mutation:
      - useDeleteTag()

    @behavior:
      - 削除実行後、タグ一覧を再取得（invalidateQueries）
      - カードからタグの紐付けが解除されるが、カード自体は削除されない

    @conditional-render:
      - isOpen === false: null を返す（非表示）
  -->
  <div
    class="modal-overlay"
    id="delete-confirm-modal"
    data-component="DeleteConfirmModal"
    data-props="isOpen,tag,onConfirm,onClose"
  >
    <div class="modal" role="alertdialog" aria-labelledby="delete-modal-title" aria-describedby="delete-modal-desc" aria-modal="true">
      <div class="modal__header">
        <h2 class="modal__title" id="delete-modal-title">タグを削除</h2>
        <!--
          @event: onClick
          @handler: onClose()
        -->
        <button
          class="modal__close"
          title="閉じる"
          data-action="onClick:onClose"
        >
          <svg data-icon="lucide:X" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        </button>
      </div>
      <div class="modal__body">
        <p class="modal__message" id="delete-modal-desc">
          このタグを削除しますか？
        </p>
        <p class="modal__message">
          <!-- @prop: tag.name -->
          <strong data-prop="tagName">英語</strong> (<span data-prop="cardCount">15</span>枚のカードに紐付け)
          <!-- @prop: tag.card_count -->
        </p>
        <!-- @section: 警告メッセージ（常に表示） -->
        <div class="modal__warning">
          <svg data-icon="lucide:Info" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <span>紐付いているカードは削除されません。タグの関連付けのみが解除されます。</span>
        </div>
      </div>
      <!-- @section: フッターボタン -->
      <div class="modal__footer">
        <!--
          @event: onClick
          @handler: onClose()
        -->
        <button
          class="btn btn--secondary"
          data-action="onClick:onClose"
        >
          キャンセル
        </button>
        <!--
          @event: onClick
          @handler: onConfirm()
          @action: deleteTag mutation 実行、成功後 onClose()
          @loading: mutation.isPending 時は disabled + ローディング表示
        -->
        <button
          class="btn btn--danger"
          data-action="onClick:onConfirm"
        >
          削除する
        </button>
      </div>
    </div>
  </div>
  <!-- [/DeleteConfirmModal] -->


  <script src="js/main.js"></script>
</body>
</html>
