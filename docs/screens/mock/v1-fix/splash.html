<!--
  @screen: スプラッシュ画面
  @path: / (ルート)
  @description: アプリ起動時の初期画面。認証状態を確認し、適切な画面へリダイレクトする
  @behavior:
    - アプリ起動時に表示
    - 認証状態を確認（セッションチェック）
    - 最低1.5秒表示後、認証状態に応じてリダイレクト
      - 認証済み: /main (メイン画面) へ遷移
      - 未認証: /login (ログイン画面) へ遷移
  @prev-screen: なし（エントリーポイント）
  @next-screen: main.html (認証済み), login.html (未認証)
-->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="splash-body">

  <!--
    @component: SplashScreen
    @type: Page Component (Client Component)
    @file: app/(auth)/page.tsx または app/splash/page.tsx
    @description: スプラッシュ画面のメインコンポーネント

    @hooks:
      - useEffect: マウント時に認証状態確認とリダイレクト処理
      - useRouter: 画面遷移用（next/navigation）

    @api:
      - GET /api/auth/session - セッション確認
      - または Supabase Auth: supabase.auth.getSession()

    @state:
      - isLoading: boolean - ローディング状態（常にtrue、遷移まで表示）

    @logic:
      useEffect(() => {
        const checkAuth = async () => {
          // 最低表示時間を確保するためPromise.allを使用
          const [session] = await Promise.all([
            supabase.auth.getSession(),
            new Promise(resolve => setTimeout(resolve, 1500)) // 最低1.5秒
          ]);

          if (session.data.session) {
            router.replace('/main');
          } else {
            router.replace('/login');
          }
        };
        checkAuth();
      }, []);
  -->
  <div class="splash" data-component="SplashScreen">
    <div class="splash__content">

      <!--
        @section: Logo
        @description: アプリロゴとアプリ名の表示エリア
        @note: アニメーション付きで表示（フェードイン推奨）
      -->
      <div class="splash__logo">
        <!--
          @element: App Icon
          @icon: lucide:Layers
          @size: 64x64
          @note: lucide-reactを使用する場合は <Layers size={64} />
        -->
        <svg class="splash__logo-icon" data-icon="lucide:Layers" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/>
          <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>
          <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
        </svg>
        <!--
          @element: App Name
          @text: "ReSave"
          @style: 大きめのフォント、ブランドカラー
        -->
        <h1 class="splash__app-name">ReSave</h1>
      </div>
      <!-- @/section: Logo -->

      <!--
        @section: Subtitle
        @description: アプリのキャッチコピー
        @text: "- 記憶を科学する -"
      -->
      <p class="splash__subtitle">- 記憶を科学する -</p>
      <!-- @/section: Subtitle -->

      <!--
        @section: Loading Indicator
        @description: ローディング中を示すスピナーとテキスト
        @state: 常に表示（認証確認中）
        @animation: スピナーは回転アニメーション
      -->
      <div class="splash__loading">
        <!--
          @element: Spinner
          @type: CSS Animation または Loader Component
          @note: shadcn/uiのLoaderコンポーネント使用可
        -->
        <div class="splash__spinner"></div>
        <!--
          @element: Loading Text
          @text: "読み込み中..."
        -->
        <span class="splash__loading-text">読み込み中...</span>
      </div>
      <!-- @/section: Loading Indicator -->

    </div>
  </div>
  <!-- @/component: SplashScreen -->

  <script src="js/main.js"></script>
</body>
</html>
