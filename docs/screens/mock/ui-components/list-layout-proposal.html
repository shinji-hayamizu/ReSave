<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>List Layout Proposal - ReSave</title>
  <style>
    :root {
      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-success: #10b981;
      --color-danger: #ef4444;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --border-radius: 8px;
      --border-radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text-primary);
      line-height: 1.6;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h2 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .section {
      margin-bottom: 40px;
    }

    /* ========================================
       NEW: List Layout (Proposal)
       ======================================== */
    .card-list-container {
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .list-item {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border-color);
    }

    .list-item:last-child {
      border-bottom: none;
    }

    .list-item__topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .rating-buttons {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .rating-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border: none;
      border-radius: var(--border-radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .rating-btn__label {
      font-weight: 600;
    }

    .rating-btn__preview {
      font-size: 11px;
      opacity: 0.8;
    }

    .rating-btn--ok {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
    }

    .rating-btn--ok:hover {
      background: var(--color-success);
      color: white;
    }

    .rating-btn--learned {
      background: rgba(37, 99, 235, 0.1);
      color: var(--color-primary);
    }

    .rating-btn--learned:hover {
      background: var(--color-primary);
      color: white;
    }

    .rating-btn--again {
      background: rgba(239, 68, 68, 0.1);
      color: var(--color-danger);
    }

    .rating-btn--again:hover {
      background: var(--color-danger);
      color: white;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      justify-content: flex-end;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: #e0f2fe;
      color: #0369a1;
      font-size: 11px;
      font-weight: 500;
      border-radius: 9999px;
      border: 1px solid #bae6fd;
    }

    .list-item__question {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .list-item__text {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .list-item__edit {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: var(--bg-secondary);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: all 150ms ease;
    }

    .list-item__edit:hover {
      background: var(--border-color);
      color: var(--text-primary);
    }

    .list-item__toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      margin-top: 12px;
      border: 2px solid var(--color-primary);
      background: transparent;
      color: var(--color-primary);
      font-size: 13px;
      font-weight: 600;
      border-radius: 9999px;
      cursor: pointer;
      transition: all 150ms ease;
    }

    .list-item__toggle:hover {
      background: var(--color-primary);
      color: white;
    }

    .list-item__toggle.open {
      background: var(--color-primary);
      color: white;
    }

    .list-item__answer {
      margin-top: 12px;
      display: inline-block;
      padding: 12px 16px;
      background: #fefce8;
      border: 1px solid #fde047;
      border-radius: var(--border-radius);
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    /* ========================================
       OLD: Card Layout (Current)
       ======================================== */
    .card-list-old {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .study-card {
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .study-card__topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
    }

    .study-card__front {
      padding: 16px 20px;
    }

    .study-card__header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .study-card__text {
      flex: 1;
      font-size: 15px;
      color: var(--text-primary);
      line-height: 1.5;
    }

    .study-card__toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--color-primary);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Comparison label */
    .comparison-label {
      display: inline-block;
      padding: 4px 12px;
      background: var(--color-primary);
      color: white;
      font-size: 12px;
      font-weight: 600;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .comparison-label--old {
      background: var(--text-secondary);
    }

    /* Mobile responsive */
    @media (max-width: 479px) {
      .list-item__topbar,
      .study-card__topbar {
        flex-wrap: wrap;
        gap: 8px;
      }

      .rating-buttons {
        width: 100%;
        gap: 0;
      }

      .rating-btn {
        flex: 1;
        padding: 8px 4px;
        font-size: 12px;
        border-radius: 0;
        justify-content: center;
      }

      .rating-btn:first-child {
        border-radius: var(--border-radius) 0 0 var(--border-radius);
      }

      .rating-btn:last-child {
        border-radius: 0 var(--border-radius) var(--border-radius) 0;
      }

      .rating-btn__preview {
        display: none;
      }

      .tags {
        width: 100%;
        justify-content: flex-start;
      }
    }
  </style>
</head>
