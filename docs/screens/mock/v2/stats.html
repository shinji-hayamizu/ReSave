<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: hsl(210 40% 98%);">
  <!--
    @screen: 統計画面
    @path: /stats
    @description: 学習の進捗を確認する統計画面
    @file: app/(main)/stats/page.tsx

    @state-management:
      - activePeriod: StatsPeriod - 'today' | 'week' | 'month' (useState)

    @hooks:
      - useTodayStats() - 今日の統計取得
      - useSummaryStats() - 累計統計取得
      - useDailyStats(days) - 日別統計取得

    @api-dependencies:
      - GET /api/stats/today - 今日の統計
      - GET /api/stats/summary - 累計統計
      - GET /api/stats/daily?days=7|30 - 日別統計
  -->

  <!-- ================================================================
       @component: StatsPage
       @description: 統計画面のルートコンポーネント
       @file: app/(main)/stats/page.tsx
       ================================================================ -->
  <div data-component="StatsPage">

    <!-- ================================================================
         @component: PageHeader
         @description: ページヘッダー
         @file: components/layout/page-header.tsx
         @props:
           - title: string
           - description?: string
           - action?: ReactNode
         ================================================================ -->
    <div class="page-header" data-component="PageHeader">
      <div class="page-header__content">
        <h1>統計</h1>
        <p class="text-sm text-muted">学習の進捗を確認しましょう</p>
      </div>
    </div>
    <!-- [/Component: PageHeader] -->

    <div class="content-wrapper space-y-5 p-4">

      <!-- ================================================================
           @component: TodaySummary
           @description: 今日の学習サマリーカード
           @file: components/stats/today-summary.tsx

           @hooks:
             - useTodayStats() - { reviewedCount, correctCount, timeSpentMinutes }
             - useSummaryStats() - { currentStreak }

           @computed:
             - accuracyRate = (correctCount / reviewedCount) * 100
           ================================================================ -->
      <div class="stat-card" data-component="TodaySummary">
        <h2 class="stat-card__title">今日の学習</h2>
        <div class="stat-grid">
          <!-- @prop: todayStats.reviewedCount -->
          <div class="stat-item stat-item--primary">
            <div class="stat-item__value" data-prop="reviewedCount">12<span class="stat-item__unit">枚</span></div>
            <div class="stat-item__label">学習カード数</div>
          </div>

          <!-- @prop: computed accuracyRate -->
          <div class="stat-item stat-item--success">
            <div class="stat-item__value" data-prop="accuracyRate">85<span class="stat-item__unit">%</span></div>
            <div class="stat-item__label">正答率</div>
          </div>

          <!-- @prop: todayStats.timeSpentMinutes -->
          <div class="stat-item">
            <div class="stat-item__value" data-prop="timeSpentMinutes">15<span class="stat-item__unit">分</span></div>
            <div class="stat-item__label">学習時間</div>
          </div>

          <!-- @prop: summaryStats.currentStreak -->
          <div class="stat-item stat-item--warning">
            <div class="stat-item__value" data-prop="currentStreak">7<span class="stat-item__unit">日</span></div>
            <div class="stat-item__label">連続学習日数</div>
          </div>
        </div>
      </div>
      <!-- [/Component: TodaySummary] -->

      <!-- ================================================================
           @component: PeriodTabs
           @description: 期間切り替えタブ
           @file: components/stats/period-tabs.tsx

           @props:
             - activePeriod: StatsPeriod
             - onPeriodChange: (period: StatsPeriod) => void

           @types:
             - StatsPeriod = 'today' | 'week' | 'month'
           ================================================================ -->
      <div class="period-tabs" data-component="PeriodTabs" data-props="activePeriod,onPeriodChange">
        <button
          type="button"
          class="period-tab active"
          data-period="today"
          data-action="onClick:onPeriodChange('today')"
        >今日</button>
        <button
          type="button"
          class="period-tab"
          data-period="week"
          data-action="onClick:onPeriodChange('week')"
        >週間</button>
        <button
          type="button"
          class="period-tab"
          data-period="month"
          data-action="onClick:onPeriodChange('month')"
        >月間</button>
      </div>
      <!-- [/Component: PeriodTabs] -->

      <!-- ================================================================
           @component: DailyStatsChart
           @description: 日別学習統計チャート
           @file: components/stats/daily-stats-chart.tsx

           @props:
             - days: number - 7 or 30

           @hooks:
             - useDailyStats(days)

           @library: recharts or similar chart library
           ================================================================ -->
      <div class="stat-card" data-component="DailyStatsChart" data-props="days">
        <h3 class="stat-card__title">日別学習カード数（過去7日）</h3>
        <!-- Bar chart with 7 days -->
        <div class="bar-chart">
          <div class="bar-chart__item">
            <div class="bar-chart__value">8</div>
            <div class="bar-chart__bar" style="height: calc(8 / 15 * 8rem);"></div>
            <div class="bar-chart__label">日</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">12</div>
            <div class="bar-chart__bar" style="height: calc(12 / 15 * 8rem);"></div>
            <div class="bar-chart__label">月</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">5</div>
            <div class="bar-chart__bar" style="height: calc(5 / 15 * 8rem);"></div>
            <div class="bar-chart__label">火</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">15</div>
            <div class="bar-chart__bar" style="height: calc(15 / 15 * 8rem);"></div>
            <div class="bar-chart__label">水</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">10</div>
            <div class="bar-chart__bar" style="height: calc(10 / 15 * 8rem);"></div>
            <div class="bar-chart__label">木</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">7</div>
            <div class="bar-chart__bar" style="height: calc(7 / 15 * 8rem);"></div>
            <div class="bar-chart__label">金</div>
          </div>
          <div class="bar-chart__item">
            <div class="bar-chart__value">3</div>
            <div class="bar-chart__bar" style="height: calc(3 / 15 * 8rem);"></div>
            <div class="bar-chart__label">土</div>
          </div>
        </div>
      </div>
      <!-- [/Component: DailyStatsChart] -->

      <!-- ================================================================
           @component: CumulativeStats
           @description: 累計統計
           @file: components/stats/cumulative-stats.tsx

           @hooks:
             - useSummaryStats()

           @data:
             - totalCards: 総カード数
             - totalReviews: 総復習回数
             - longestStreak: 連続学習日数
             - averageAccuracy: 平均正答率
           ================================================================ -->
      <div class="stat-card" data-component="CumulativeStats">
        <h3 class="stat-card__title">累計統計</h3>
        <div class="stat-grid">
          <!-- Layers icon + 総カード数 -->
          <div class="cumulative-stat">
            <!-- @icon: lucide-react Layers -->
            <svg class="cumulative-stat__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22.54 12.43-1.96-.89"/><path d="m2.58 12.15-1.12.51"/><path d="m22.54 16.43-10 4.55a2 2 0 0 1-1.66 0l-10-4.55"/></svg>
            <div class="stat-item__value" data-prop="totalCards">156<span class="stat-item__unit">枚</span></div>
            <div class="stat-item__label">総カード数</div>
          </div>

          <!-- RotateCcw icon + 総復習回数 -->
          <div class="cumulative-stat">
            <!-- @icon: lucide-react RotateCcw -->
            <svg class="cumulative-stat__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
            <div class="stat-item__value" data-prop="totalReviews">1,234<span class="stat-item__unit">回</span></div>
            <div class="stat-item__label">総復習回数</div>
          </div>

          <!-- Flame icon + 連続学習日数 -->
          <div class="cumulative-stat">
            <!-- @icon: lucide-react Flame -->
            <svg class="cumulative-stat__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
            <div class="stat-item__value" data-prop="longestStreak">14<span class="stat-item__unit">日</span></div>
            <div class="stat-item__label">連続学習日数</div>
          </div>

          <!-- Target icon + 平均正答率 -->
          <div class="cumulative-stat">
            <!-- @icon: lucide-react Target -->
            <svg class="cumulative-stat__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            <div class="stat-item__value" data-prop="averageAccuracy">82<span class="stat-item__unit">%</span></div>
            <div class="stat-item__label">平均正答率</div>
          </div>
        </div>
      </div>
      <!-- [/Component: CumulativeStats] -->

    </div>
  </div>
  <!-- [/Component: StatsPage] -->

</body>
</html>
