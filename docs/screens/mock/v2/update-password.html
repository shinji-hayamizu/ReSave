<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワード更新 - ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    @screen: パスワード更新画面
    @path: /update-password
    @description: パスワードリセットメールのリンクから遷移。新しいパスワードを設定する画面
    @file: app/(auth)/update-password/page.tsx
    @feature: F-001 (ユーザー認証)

    @state-management:
      - error: string | null - エラーメッセージ (useState)
      - loading: boolean - 更新処理中フラグ (useState)
      - success: boolean - 更新成功フラグ (useState)
      - showPassword: boolean - パスワード表示/非表示 (useState)
      - showPasswordConfirm: boolean - 確認パスワード表示/非表示 (useState)

    @form-validation:
      - password: required, min 8 chars, must contain letters and numbers
      - passwordConfirm: required, must match password

    @api-dependencies:
      - supabase.auth.updateUser({ password }) - パスワード更新

    @routing:
      - 成功時: 自動的にホームページへリダイレクト (setTimeout)
      - ホーム: /
  -->

  <!-- ================================================================
       @component: UpdatePasswordPage
       @description: パスワード更新画面のルートコンポーネント
       @file: app/(auth)/update-password/page.tsx
       ================================================================ -->
  <div class="auth-layout" data-component="UpdatePasswordPage">

    <!-- @section: ロゴ -->
    <div class="auth-logo">
      <!-- @icon: ReSave custom icon -->
      <svg class="auth-logo__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="2" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.85"/>
        <line x1="6" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6" y1="9" x2="11" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="9" y="6" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.6"/>
        <line x1="12" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="13" x2="17" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="auth-logo__text">ReSave</span>
    </div>

    <!-- ================================================================
         @component: UpdatePasswordForm
         @description: パスワード更新フォーム
         @file: components/auth/update-password-form.tsx
         @uses: react-hook-form, @hookform/resolvers/zod
         ================================================================ -->
    <div class="auth-card" data-component="UpdatePasswordForm">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">新しいパスワードを設定</h2>
          <p class="card-description">新しいパスワードを入力してください</p>
        </div>
        <div class="card-content">
          <form class="space-y-4" data-action="onSubmit:handleUpdatePassword" novalidate>

            <!-- @component: FormField - password -->
            <div class="form-group" data-component="FormField" data-field="password">
              <label class="form-label" for="password">新しいパスワード</label>
              <!-- @component: PasswordInput (custom) - 表示/非表示切り替え機能付き -->
              <div class="input-wrapper" style="position: relative;">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-input"
                  autocomplete="new-password"
                  data-prop="password"
                  style="padding-right: 2.5rem;"
                >
                <!-- @event: onClick={() => setShowPassword(!showPassword)} -->
                <button
                  type="button"
                  class="password-toggle"
                  data-action="onClick:togglePasswordVisibility"
                  style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; color: hsl(215.4 16.3% 46.9%);"
                  aria-label="パスワードを表示"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <p class="form-hint">8文字以上、英字と数字を含む</p>
              <p class="form-error" data-show-if="errors.password" style="display: none;">パスワードは8文字以上で、英字と数字を含めてください</p>
            </div>

            <!-- @component: FormField - passwordConfirm -->
            <div class="form-group" data-component="FormField" data-field="passwordConfirm">
              <label class="form-label" for="password-confirm">パスワード（確認）</label>
              <!-- @component: PasswordInput (custom) - 表示/非表示切り替え機能付き -->
              <div class="input-wrapper" style="position: relative;">
                <input
                  type="password"
                  id="password-confirm"
                  name="passwordConfirm"
                  class="form-input"
                  autocomplete="new-password"
                  data-prop="passwordConfirm"
                  style="padding-right: 2.5rem;"
                >
                <!-- @event: onClick={() => setShowPasswordConfirm(!showPasswordConfirm)} -->
                <button
                  type="button"
                  class="password-toggle"
                  data-action="onClick:togglePasswordConfirmVisibility"
                  style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; color: hsl(215.4 16.3% 46.9%);"
                  aria-label="パスワードを表示"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <p class="form-error" data-show-if="errors.passwordConfirm" style="display: none;">パスワードが一致しません</p>
            </div>

            <!-- @section: エラーメッセージ -->
            <p class="text-sm text-destructive" data-show-if="error" style="display: none;" data-prop="error">パスワードの更新に失敗しました。再度お試しください</p>

            <!-- @section: 送信ボタン -->
            <button
              type="submit"
              class="btn btn--primary btn--block"
              data-prop="disabled:loading"
            >
              <!-- @condition: {loading ? '更新中...' : 'パスワードを更新'} -->
              <span data-prop="buttonText">パスワードを更新</span>
            </button>

          </form>
        </div>
      </div>
    </div>
    <!-- [/Component: UpdatePasswordForm] -->

    <!-- ================================================================
         @section: 更新成功画面
         @condition: {success && <SuccessState />}
         @description: パスワード更新成功時に表示。デフォルトは非表示。自動リダイレクトあり
         ================================================================ -->
    <div class="auth-card" data-component="UpdatePasswordSuccessState" data-show-if="success" style="display: none;">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">パスワードを更新しました</h2>
          <p class="card-description">自動的にホームページへ移動します...</p>
        </div>
        <div class="card-content">
          <div class="auth-links">
            <p class="text-muted">
              <!-- @navigation: / -->
              <a href="../home.html">今すぐホームへ移動</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <!-- [/Component: UpdatePasswordSuccessState] -->

  </div>
  <!-- [/Component: UpdatePasswordPage] -->

</body>
</html>
