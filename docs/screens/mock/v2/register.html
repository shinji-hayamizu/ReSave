<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    @screen: 新規登録画面
    @path: /signup
    @description: 新規ユーザー登録画面。メールアドレス/パスワードまたはGoogle OAuthで登録
    @file: app/(auth)/signup/page.tsx
    @feature: F-001 (ユーザー認証)

    @state-management:
      - error: string | null - エラーメッセージ (useState)
      - loading: boolean - 登録処理中フラグ (useState)
      - success: boolean - 登録成功フラグ (useState)
      - showPassword: boolean - パスワード表示/非表示 (useState)
      - showPasswordConfirm: boolean - 確認パスワード表示/非表示 (useState)

    @form-validation:
      - email: required, email format (Zod: signupSchema)
      - password: required, min 8 chars, must contain letters and numbers
      - passwordConfirm: required, must match password

    @api-dependencies:
      - supabase.auth.signUp() - メール/パスワード新規登録
      - supabase.auth.signInWithOAuth({ provider: 'google' }) - Google登録

    @routing:
      - 成功時: 確認メール送信画面表示
      - ログイン: /login
  -->

  <!-- ================================================================
       @component: SignupPage
       @description: 新規登録画面のルートコンポーネント
       @file: app/(auth)/signup/page.tsx
       ================================================================ -->
  <div class="auth-layout" data-component="SignupPage">

    <!-- @section: ロゴ -->
    <div class="auth-logo">
      <!-- @icon: ReSave custom icon -->
      <svg class="auth-logo__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="2" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.85"/>
        <line x1="6" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6" y1="9" x2="11" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="9" y="6" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.6"/>
        <line x1="12" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="13" x2="17" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="auth-logo__text">ReSave</span>
    </div>

    <!-- ================================================================
         @component: SignupForm
         @description: 新規登録フォーム
         @file: components/auth/signup-form.tsx
         @uses: react-hook-form, @hookform/resolvers/zod
         ================================================================ -->
    <div class="auth-card" data-component="SignupForm">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">新規登録</h2>
          <p class="card-description">アカウントを作成してください</p>
        </div>
        <div class="card-content">

          <!-- @section: Google 登録ボタン (フォームの前) -->
          <!-- @event: onClick={() => supabase.auth.signInWithOAuth({ provider: 'google' }) -->
          <button
            type="button"
            class="btn btn--outline btn--block"
            data-action="onClick:handleGoogleSignup"
            style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1rem;"
          >
            <!-- @icon: Google logo -->
            <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            <span>Googleで登録</span>
          </button>

          <!-- @section: ディバイダー -->
          <div class="auth-divider" style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem;">
            <hr style="flex: 1; border: none; border-top: 1px solid hsl(214.3 31.8% 91.4%);">
            <span style="color: hsl(215.4 16.3% 46.9%); font-size: 0.875rem;">または</span>
            <hr style="flex: 1; border: none; border-top: 1px solid hsl(214.3 31.8% 91.4%);">
          </div>

          <form class="space-y-4" data-action="onSubmit:handleSignup" novalidate>

            <!-- @component: FormField - email -->
            <div class="form-group" data-component="FormField" data-field="email">
              <label class="form-label" for="email">メールアドレス</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="email@example.com"
                autocomplete="email"
                data-prop="email"
              >
              <p class="form-error" data-show-if="errors.email" style="display: none;">有効なメールアドレスを入力してください</p>
            </div>

            <!-- @component: FormField - password -->
            <div class="form-group" data-component="FormField" data-field="password">
              <label class="form-label" for="password">パスワード</label>
              <!-- @component: PasswordInput (custom) - 表示/非表示切り替え機能付き -->
              <div class="input-wrapper" style="position: relative;">
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-input"
                  autocomplete="new-password"
                  data-prop="password"
                  style="padding-right: 2.5rem;"
                >
                <!-- @event: onClick={() => setShowPassword(!showPassword)} -->
                <button
                  type="button"
                  class="password-toggle"
                  data-action="onClick:togglePasswordVisibility"
                  style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; color: hsl(215.4 16.3% 46.9%);"
                  aria-label="パスワードを表示"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <p class="form-hint">8文字以上、英字と数字を含む</p>
              <p class="form-error" data-show-if="errors.password" style="display: none;">パスワードは8文字以上で、英字と数字を含めてください</p>
            </div>

            <!-- @component: FormField - passwordConfirm -->
            <div class="form-group" data-component="FormField" data-field="passwordConfirm">
              <label class="form-label" for="password-confirm">パスワード（確認）</label>
              <!-- @component: PasswordInput (custom) - 表示/非表示切り替え機能付き -->
              <div class="input-wrapper" style="position: relative;">
                <input
                  type="password"
                  id="password-confirm"
                  name="passwordConfirm"
                  class="form-input"
                  autocomplete="new-password"
                  data-prop="passwordConfirm"
                  style="padding-right: 2.5rem;"
                >
                <!-- @event: onClick={() => setShowPasswordConfirm(!showPasswordConfirm)} -->
                <button
                  type="button"
                  class="password-toggle"
                  data-action="onClick:togglePasswordConfirmVisibility"
                  style="position: absolute; right: 0.5rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; color: hsl(215.4 16.3% 46.9%);"
                  aria-label="パスワードを表示"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/>
                    <circle cx="12" cy="12" r="3"/>
                  </svg>
                </button>
              </div>
              <p class="form-error" data-show-if="errors.passwordConfirm" style="display: none;">パスワードが一致しません</p>
            </div>

            <!-- @section: エラーメッセージ -->
            <p class="text-sm text-destructive" data-show-if="error" style="display: none;" data-prop="error">登録に失敗しました</p>

            <!-- @section: 送信ボタン -->
            <button
              type="submit"
              class="btn btn--primary btn--block"
              data-prop="disabled:loading"
            >
              <!-- @condition: {loading ? '登録中...' : '新規登録'} -->
              <span data-prop="buttonText">新規登録</span>
            </button>

            <!-- @section: リンク -->
            <div class="auth-links">
              <p class="text-muted">
                すでにアカウントをお持ちの方は
                <!-- @navigation: /login -->
                <a href="login.html">ログイン</a>
              </p>
            </div>

          </form>
        </div>
      </div>
    </div>
    <!-- [/Component: SignupForm] -->

    <!-- ================================================================
         @section: 登録成功 - 確認メール送信画面
         @condition: {success && <SuccessState />}
         @description: 登録成功時に表示。デフォルトは非表示
         ================================================================ -->
    <div class="auth-card" data-component="SignupSuccessState" data-show-if="success" style="display: none;">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">確認メールを送信しました</h2>
          <p class="card-description">
            <span data-prop="email">your-email@example.com</span> に確認メールを送信しました。メールに記載されたリンクをクリックして、アカウントを有効化してください。
          </p>
        </div>
        <div class="card-content">
          <div class="auth-links">
            <p class="text-muted">
              <!-- @navigation: /login -->
              <a href="login.html">ログインに戻る</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <!-- [/Component: SignupSuccessState] -->

  </div>
  <!-- [/Component: SignupPage] -->

</body>
</html>
