<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    @screen: AppShell (index.html)
    @description: ReSaveアプリの基盤シェル。サイドバー、ヘッダー、コンテンツエリアを含むメインレイアウト
    @file: app/(main)/layout.tsx
    @architecture: Next.js App Router

    @responsive:
      - Mobile (<768px): ボトムナビゲーション表示、サイドバー非表示
      - Desktop (>=768px): サイドバー表示、ボトムナビゲーション非表示

    @auth: 認証必須 - 未認証時は /login にリダイレクト

    @api:
      - supabase.auth.getUser() - ユーザーセッション取得
  -->

  <!-- ================================================================
       @component: MainLayout
       @description: 認証済みユーザー用のメインレイアウト
       @file: app/(main)/layout.tsx
       ================================================================ -->
  <div class="layout" data-component="MainLayout">

    <!-- ================================================================
         @component: SidebarOverlay
         @description: モバイル時のサイドバー背景オーバーレイ
         @condition: isSidebarOpen && isMobile
         @event: onClick={closeSidebar}
         ================================================================ -->
    <div
      class="sidebar-overlay"
      id="sidebar-overlay"
      data-component="SidebarOverlay"
      data-action="onClick:closeSidebar"
    ></div>

    <!-- ================================================================
         @component: AppSidebar
         @description: サイドナビゲーション
         @file: components/layout/app-sidebar.tsx

         @behavior:
           - Desktop: hover時に展開
           - Mobile: メニューボタンで開閉
         ================================================================ -->
    <aside class="sidebar" id="sidebar" data-component="AppSidebar">
      <!-- @section: ロゴ -->
      <div class="sidebar__logo">
        <!-- @icon: ReSave custom icon (stacked cards) -->
        <svg class="sidebar__logo-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="2" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.85"/>
          <line x1="6" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="6" y1="9" x2="11" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="9" y="6" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.6"/>
          <line x1="12" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="13" x2="17" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="sidebar__logo-text">ReSave</span>
      </div>

      <!-- ================================================================
           @component: SidebarNav
           @description: ナビゲーションリンク
           @file: components/layout/app-sidebar.tsx

           @navigation:
             - / : ホーム
             - /cards/completed : 完了
             - /tags : タグ管理
             - /settings : 設定
             - /about : About
           ================================================================ -->
      <nav class="sidebar__nav" data-component="SidebarNav">
        <!-- @condition: className={pathname === '/' ? 'active' : ''} -->
        <a href="#" class="sidebar__link active" data-page="main" data-action="onClick:handleNavClick">
          <!-- @icon: lucide-react Home -->
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="sidebar__label">ホーム</span>
        </a>

        <a href="#" class="sidebar__link" data-page="completed" data-action="onClick:handleNavClick">
          <!-- @icon: lucide-react CheckCheck -->
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
          <span class="sidebar__label">完了</span>
        </a>

        <a href="#" class="sidebar__link" data-page="tags" data-action="onClick:handleNavClick">
          <!-- @icon: lucide-react Tag -->
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>
          <span class="sidebar__label">タグ</span>
        </a>

        <a href="#" class="sidebar__link" data-page="settings" data-action="onClick:handleNavClick">
          <!-- @icon: lucide-react Settings -->
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          <span class="sidebar__label">設定</span>
        </a>

        <a href="#" class="sidebar__link" data-page="about" data-action="onClick:handleNavClick">
          <!-- @icon: lucide-react Info -->
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
          <span class="sidebar__label">About</span>
        </a>
      </nav>
    </aside>
    <!-- [/Component: AppSidebar] -->

    <!-- ================================================================
         @component: MainContent
         @description: メインコンテンツエリア
         ================================================================ -->
    <main class="main" data-component="MainContent">

      <!-- ================================================================
           @component: AppHeader
           @description: ヘッダー
           @file: components/layout/app-header.tsx
           ================================================================ -->
      <header class="header" data-component="AppHeader">
        <div class="header__left">
          <!-- @event: onClick={toggleSidebar} -->
          <!-- @condition: Mobile only -->
          <button
            class="header__menu-btn"
            id="menu-btn"
            data-action="onClick:toggleSidebar"
          >
            <!-- @icon: lucide-react Menu -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          </button>
          <!-- @section: Mobile logo + title (visible on mobile only) -->
          <div class="header__mobile-brand">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="2" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.85"/>
              <line x1="6" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="6" y1="9" x2="11" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
              <rect x="9" y="6" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.6"/>
              <line x1="12" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
              <line x1="12" y1="13" x2="17" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <h1 class="header__title">ReSave</h1>
          </div>
        </div>
        <div class="header__right">
          <!-- @component: CreateCardDialog -->
          <!-- @file: components/cards/create-card-dialog.tsx -->
          <button
            type="button"
            class="btn btn--primary btn--icon"
            title="カード作成"
            data-component="CreateCardDialog"
            data-action="onClick:openCreateCardDialog"
          >
            <!-- @icon: lucide-react Plus -->
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
          </button>
        </div>
      </header>
      <!-- [/Component: AppHeader] -->

      <!-- ================================================================
           @section: ContentArea
           @description: ページコンテンツ表示エリア
           @implementation: Next.js では {children} として実装

           @routes:
             - main.html (/) - ホーム画面
             - completed.html (/cards/completed) - 完了カード
             - tags.html (/tags) - タグ管理
             - settings.html (/settings) - 設定
             - about.html (/about) - About
             - card-input.html (/cards/:id/edit) - カード編集
             - update-password.html (/update-password) - パスワード更新
           ================================================================ -->
      <iframe
        id="content-frame"
        class="content-frame"
        src="main.html"
        title="Content"
        style="flex: 1; width: 100%; border: none; background: hsl(210 40% 98%);"
      ></iframe>

    </main>
    <!-- [/Component: MainContent] -->

    <!-- ================================================================
         @component: BottomNav
         @description: モバイル用ボトムナビゲーション
         @file: components/layout/bottom-nav.tsx
         @condition: Mobile only (<768px)
         ================================================================ -->
    <nav class="bottom-nav" data-component="BottomNav">
      <a href="#" class="bottom-nav__item active" data-page="main">
        <!-- @icon: lucide-react Home -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>ホーム</span>
      </a>
      <a href="#" class="bottom-nav__item" data-page="completed">
        <!-- @icon: lucide-react CheckCheck -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
        <span>完了</span>
      </a>
      <a href="#" class="bottom-nav__item" data-page="tags">
        <!-- @icon: lucide-react Tag -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg>
        <span>タグ</span>
      </a>
      <a href="#" class="bottom-nav__item" data-page="settings">
        <!-- @icon: lucide-react Settings -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span>設定</span>
      </a>
      <a href="#" class="bottom-nav__item" data-page="about">
        <!-- @icon: lucide-react Info -->
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>About</span>
      </a>
    </nav>
    <!-- [/Component: BottomNav] -->

  </div>
  <!-- [/Component: MainLayout] -->

  <script src="js/main.js"></script>
</body>
</html>
