<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: hsl(210 40% 98%);">
  <!--
    @screen: 設定画面
    @path: /settings
    @description: アプリの設定とアカウントを管理する画面
    @file: app/(main)/settings/page.tsx

    @components:
      - NotificationSettings - 通知設定（v1.2で追加予定）
      - AccountSettings - アカウント設定
  -->

  <!-- ================================================================
       @component: SettingsPage
       @description: 設定画面のルートコンポーネント
       @file: app/(main)/settings/page.tsx
       ================================================================ -->
  <div data-component="SettingsPage">

    <!-- @component: PageHeader -->
    <div class="page-header" data-component="PageHeader">
      <div class="page-header__content">
        <h1>設定</h1>
        <p class="text-sm text-muted">アプリの設定とアカウントを管理</p>
      </div>
    </div>

    <div class="content-wrapper space-y-6 p-4" style="max-width: 42rem;">

      <!-- ================================================================
           @component: NotificationSettings
           @description: 通知設定（プレースホルダー）
           @file: components/settings/notification-settings.tsx
           @note: v1.2で追加予定
           ================================================================ -->
      <div class="card" data-component="NotificationSettings" style="opacity: 0.6;">
        <div class="card-header">
          <h2 class="card-title" style="display: flex; align-items: center; gap: 0.5rem;">
            通知設定
            <span style="display: inline-flex; padding: 0.125rem 0.5rem; background: hsl(var(--muted)); border-radius: 9999px; font-size: 0.75rem; font-weight: 400; color: hsl(var(--muted-foreground));">
              v1.2で追加予定
            </span>
          </h2>
          <p class="card-description">プッシュ通知とリマインダーの設定</p>
        </div>
        <div class="card-content">
          <p class="text-sm text-muted">
            通知設定は今後のアップデートで追加予定です。毎日のリマインダーや学習通知を設定できるようになります。
          </p>
        </div>
      </div>
      <!-- [/Component: NotificationSettings] -->

      <!-- ================================================================
           @component: AccountSettings
           @description: アカウント設定
           @file: components/settings/account-settings.tsx

           @hooks:
             - useAuth() - ユーザー情報取得

           @api:
             - signOut() - ログアウト (Server Action)
           ================================================================ -->
      <div class="card" data-component="AccountSettings">
        <div class="card-header">
          <h2 class="card-title">アカウント設定</h2>
          <p class="card-description">アカウント情報を管理</p>
        </div>
        <div class="card-content" style="display: flex; flex-direction: column; gap: 1rem;">
          <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <p class="text-sm font-medium">メールアドレス</p>
            <!-- @prop: user.email -->
            <p class="text-sm text-muted" data-prop="userEmail">user@example.com</p>
          </div>
          <div style="padding-top: 0.5rem;">
            <!-- @event: onClick={handleSignOut} -->
            <button
              type="button"
              class="btn btn--destructive"
              data-action="onClick:handleSignOut"
            >
              <!-- @icon: lucide-react LogOut -->
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
              ログアウト
            </button>
          </div>
        </div>
      </div>
      <!-- [/Component: AccountSettings] -->

    </div>
  </div>
  <!-- [/Component: SettingsPage] -->

</body>
</html>
