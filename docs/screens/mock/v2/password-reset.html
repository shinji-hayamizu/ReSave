<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    @screen: パスワードリセット画面
    @path: /reset-password
    @description: パスワードリセットメール送信画面
    @file: app/(auth)/reset-password/page.tsx
    @feature: F-001 (ユーザー認証)

    @state-management:
      - error: string | null - エラーメッセージ (useState)
      - loading: boolean - 処理中フラグ (useState)
      - success: boolean - 送信成功フラグ (useState)

    @form-validation:
      - email: required, email format

    @api-dependencies:
      - supabase.auth.resetPasswordForEmail() - リセットメール送信

    @routing:
      - 成功時: 成功メッセージ表示
      - ログイン: /login
  -->

  <!-- ================================================================
       @component: ResetPasswordPage
       @description: パスワードリセット画面のルートコンポーネント
       @file: app/(auth)/reset-password/page.tsx
       ================================================================ -->
  <div class="auth-layout" data-component="ResetPasswordPage">

    <!-- @section: ロゴ -->
    <div class="auth-logo">
      <!-- @icon: ReSave custom icon -->
      <svg class="auth-logo__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="2" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.85"/>
        <line x1="6" y1="6" x2="12" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="6" y1="9" x2="11" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <rect x="9" y="6" width="12" height="16" rx="2" fill="hsl(217.2,91.2%,59.8%)" opacity="0.6"/>
        <line x1="12" y1="10" x2="18" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="12" y1="13" x2="17" y2="13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="auth-logo__text">ReSave</span>
    </div>

    <!-- ================================================================
         @component: ResetPasswordForm
         @description: パスワードリセットフォーム
         @file: components/auth/reset-password-form.tsx
         ================================================================ -->
    <div class="auth-card" data-component="ResetPasswordForm">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">パスワードリセット</h2>
          <p class="card-description">登録済みのメールアドレスを入力してください</p>
        </div>
        <div class="card-content">
          <form class="space-y-4" data-action="onSubmit:handleResetPassword" novalidate>

            <!-- @component: FormField - email -->
            <div class="form-group" data-component="FormField" data-field="email">
              <label class="form-label" for="email">メールアドレス</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="email@example.com"
                autocomplete="email"
                data-prop="email"
              >
              <p class="form-error" data-show-if="errors.email" style="display: none;">有効なメールアドレスを入力してください</p>
            </div>

            <!-- @section: エラーメッセージ -->
            <p class="text-sm text-destructive" data-show-if="error" style="display: none;" data-prop="error">メールの送信に失敗しました</p>

            <!-- @section: 送信ボタン -->
            <button
              type="submit"
              class="btn btn--primary btn--block"
              data-prop="disabled:loading"
            >
              <!-- @condition: {loading ? '送信中...' : 'リセットリンクを送信'} -->
              <span data-prop="buttonText">リセットリンクを送信</span>
            </button>

            <!-- @section: リンク -->
            <div class="auth-links">
              <p class="text-muted">
                <!-- @navigation: /login -->
                <a href="login.html">ログインに戻る</a>
              </p>
            </div>

          </form>
        </div>
      </div>
    </div>
    <!-- [/Component: ResetPasswordForm] -->

    <!-- ================================================================
         @section: 送信成功画面
         @condition: {success && <SuccessState />}
         @description: メール送信成功時に表示。デフォルトは非表示
         ================================================================ -->
    <div class="auth-card" data-component="ResetPasswordSuccessState" data-show-if="success" style="display: none;">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">メールを送信しました</h2>
          <p class="card-description">パスワードリセット用のメールを送信しました。メールに記載されたリンクからパスワードを再設定してください。</p>
        </div>
        <div class="card-content">
          <div class="auth-links">
            <p class="text-muted">
              <!-- @navigation: /login -->
              <a href="login.html">ログインに戻る</a>
            </p>
          </div>
        </div>
      </div>
    </div>
    <!-- [/Component: ResetPasswordSuccessState] -->

  </div>
  <!-- [/Component: ResetPasswordPage] -->

</body>
</html>
