<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - ReSave</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!--
    @screen: パスワードリセット画面
    @path: /reset-password
    @description: パスワードリセットメール送信画面
    @file: app/(auth)/reset-password/page.tsx
    @feature: F-001 (ユーザー認証)

    @state-management:
      - error: string | null - エラーメッセージ (useState)
      - loading: boolean - 処理中フラグ (useState)
      - success: boolean - 送信成功フラグ (useState)

    @form-validation:
      - email: required, email format

    @api-dependencies:
      - supabase.auth.resetPasswordForEmail() - リセットメール送信

    @routing:
      - 成功時: 成功メッセージ表示
      - ログイン: /login
  -->

  <!-- ================================================================
       @component: ResetPasswordPage
       @description: パスワードリセット画面のルートコンポーネント
       @file: app/(auth)/reset-password/page.tsx
       ================================================================ -->
  <div class="auth-layout" data-component="ResetPasswordPage">

    <!-- @section: ロゴ -->
    <div class="auth-logo">
      <svg class="auth-logo__icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/>
        <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>
        <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
      </svg>
      <span class="auth-logo__text">ReSave</span>
    </div>

    <!-- ================================================================
         @component: ResetPasswordForm
         @description: パスワードリセットフォーム
         @file: components/auth/reset-password-form.tsx
         ================================================================ -->
    <div class="auth-card" data-component="ResetPasswordForm">
      <div class="card">
        <div class="card-header" style="text-align: center;">
          <h2 class="card-title" style="font-size: 1.5rem;">パスワードをリセット</h2>
          <p class="card-description">登録したメールアドレスを入力してください</p>
        </div>
        <div class="card-content">
          <form class="space-y-4" data-action="onSubmit:handleResetPassword" novalidate>

            <!-- @component: FormField - email -->
            <div class="form-group" data-component="FormField" data-field="email">
              <label class="form-label" for="email">メールアドレス</label>
              <input
                type="email"
                id="email"
                name="email"
                class="form-input"
                placeholder="email@example.com"
                autocomplete="email"
                data-prop="email"
              >
              <p class="form-error" data-show-if="errors.email" style="display: none;">有効なメールアドレスを入力してください</p>
            </div>

            <!-- @section: 成功メッセージ -->
            <!-- @condition: {success && <SuccessMessage />} -->
            <div class="card" style="background: hsl(160.1 84.1% 39.4% / 0.1); border-color: hsl(160.1 84.1% 39.4% / 0.3);" data-show-if="success" data-state="hidden">
              <div class="card-content" style="padding: 1rem;">
                <p class="text-sm" style="color: hsl(160.1 84.1% 39.4%);">
                  パスワードリセットのメールを送信しました。メールをご確認ください。
                </p>
              </div>
            </div>

            <!-- @section: エラーメッセージ -->
            <p class="text-sm text-destructive" data-show-if="error" style="display: none;" data-prop="error">メールの送信に失敗しました</p>

            <!-- @section: 送信ボタン -->
            <button
              type="submit"
              class="btn btn--primary btn--block"
              data-prop="disabled:loading"
            >
              <span data-prop="buttonText">リセットメールを送信</span>
            </button>

            <!-- @section: リンク -->
            <div class="auth-links">
              <p class="text-muted">
                <a href="login.html">ログインに戻る</a>
              </p>
            </div>

          </form>
        </div>
      </div>
    </div>
    <!-- [/Component: ResetPasswordForm] -->

  </div>
  <!-- [/Component: ResetPasswordPage] -->

</body>
</html>
