<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReSave - ダッシュボード</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!--
    Pattern 1: Professional Blue
    Theme: Trust and professionalism, corporate SaaS style
    Primary: #2563eb (Blue 600)
    Accent: #0ea5e9 (Sky 500)
  -->

  <div class="layout">
    <!-- Sidebar (3-stage responsive: mobile hidden / tablet collapsed with hover / desktop full) -->
    <aside class="sidebar">
      <div class="sidebar__logo">
        <svg class="sidebar__logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
        <span class="sidebar__logo-text">ReSave</span>
      </div>

      <nav class="sidebar__nav">
        <!-- Dashboard -->
        <a href="#" class="sidebar__link active">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9,22 9,12 15,12 15,22"/>
          </svg>
          <span class="sidebar__label">ダッシュボード</span>
        </a>

        <!-- Cards -->
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
            <line x1="8" y1="21" x2="16" y2="21"/>
            <line x1="12" y1="17" x2="12" y2="21"/>
          </svg>
          <span class="sidebar__label">カード</span>
        </a>

        <!-- Tags -->
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <span class="sidebar__label">タグ</span>
        </a>

        <!-- Stats -->
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span class="sidebar__label">統計</span>
        </a>

        <!-- Settings -->
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="sidebar__label">設定</span>
        </a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Header -->
      <header class="header">
        <div class="header__left">
          <button class="header__menu-btn mobile-only">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="header__title">ダッシュボード</h1>
        </div>
        <div class="header__right">
          <button class="btn btn--primary">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="btn__icon">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            新規カード
          </button>
          <div class="header__avatar">田</div>
        </div>
      </header>

      <!-- Dashboard Content -->
      <div class="dashboard">
        <!-- Welcome Section -->
        <div class="welcome">
          <h2 class="welcome__title">おかえりなさい</h2>
          <p class="welcome__date">2026年1月2日（木）</p>
        </div>

        <!-- Stats Grid -->
        <div class="stats-grid">
          <!-- Cards to review today -->
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--primary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                <line x1="8" y1="21" x2="16" y2="21"/>
                <line x1="12" y1="17" x2="12" y2="21"/>
              </svg>
            </div>
            <div class="stat-card__content">
              <p class="stat-card__label">今日の復習カード</p>
              <p class="stat-card__value">24<span class="stat-card__unit">枚</span></p>
            </div>
          </div>

          <!-- Streak -->
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--accent">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
              </svg>
            </div>
            <div class="stat-card__content">
              <p class="stat-card__label">連続学習</p>
              <p class="stat-card__value">7<span class="stat-card__unit">日</span></p>
            </div>
          </div>

          <!-- Total cards -->
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--success">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14,2 14,8 20,8"/>
              </svg>
            </div>
            <div class="stat-card__content">
              <p class="stat-card__label">総カード数</p>
              <p class="stat-card__value">156<span class="stat-card__unit">枚</span></p>
            </div>
          </div>

          <!-- Mastery rate -->
          <div class="stat-card">
            <div class="stat-card__icon stat-card__icon--warning">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22,4 12,14.01 9,11.01"/>
              </svg>
            </div>
            <div class="stat-card__content">
              <p class="stat-card__label">習熟率</p>
              <p class="stat-card__value">78<span class="stat-card__unit">%</span></p>
            </div>
          </div>
        </div>

        <!-- Recent Activity Section -->
        <section class="section">
          <div class="section__header">
            <h2 class="section__title">最近のアクティビティ</h2>
            <a href="#" class="section__link">すべて見る</a>
          </div>
          <div class="activity-list">
            <div class="activity-item">
              <div class="activity-item__icon activity-item__icon--review">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="20,6 9,17 4,12"/>
                </svg>
              </div>
              <div class="activity-item__content">
                <p class="activity-item__text"><strong>英単語</strong> のカードを8枚復習しました</p>
                <p class="activity-item__time">2時間前</p>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-item__icon activity-item__icon--add">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </div>
              <div class="activity-item__content">
                <p class="activity-item__text">新しいカードを<strong>3枚</strong>追加しました</p>
                <p class="activity-item__time">5時間前</p>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-item__icon activity-item__icon--streak">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <div class="activity-item__content">
                <p class="activity-item__text"><strong>7日間</strong>連続学習を達成しました</p>
                <p class="activity-item__time">昨日</p>
              </div>
            </div>
            <div class="activity-item">
              <div class="activity-item__icon activity-item__icon--tag">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                  <line x1="7" y1="7" x2="7.01" y2="7"/>
                </svg>
              </div>
              <div class="activity-item__content">
                <p class="activity-item__text">新しいタグ「<strong>プログラミング</strong>」を作成しました</p>
                <p class="activity-item__time">2日前</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav">
      <a href="#" class="bottom-nav__item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        <span>ホーム</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
        </svg>
        <span>カード</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
        </svg>
        <span>タグ</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
        <span>統計</span>
      </a>
      <a href="#" class="bottom-nav__item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4"/>
        </svg>
        <span>設定</span>
      </a>
    </nav>
  </div>
</body>
</html>
