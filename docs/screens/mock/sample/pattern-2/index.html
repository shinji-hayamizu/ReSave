<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReSave - Dashboard | Modern Dark</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__header">
        <svg class="sidebar__logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span class="sidebar__logo-text">ReSave</span>
      </div>

      <nav class="sidebar__nav">
        <a href="#" class="sidebar__link sidebar__link--active">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          <span class="sidebar__text">Dashboard</span>
        </a>
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <span class="sidebar__text">Cards</span>
        </a>
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
            <line x1="7" y1="7" x2="7.01" y2="7"/>
          </svg>
          <span class="sidebar__text">Tags</span>
        </a>
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          <span class="sidebar__text">Stats</span>
        </a>
        <a href="#" class="sidebar__link">
          <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
          <span class="sidebar__text">Settings</span>
        </a>
      </nav>
    </aside>

    <!-- Sidebar Overlay (Mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Main Content -->
    <main class="main">
      <!-- Header -->
      <header class="header">
        <div class="header__left">
          <button class="header__menu-btn" id="menuBtn" aria-label="Toggle menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="header__right">
          <button class="btn btn--primary">
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span class="btn__text">New Card</span>
          </button>
          <div class="header__user">
            <div class="header__avatar">H</div>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div class="content">
        <!-- Welcome Section -->
        <section class="welcome">
          <div class="welcome__text">
            <h1 class="welcome__title">Welcome back!</h1>
            <p class="welcome__date">2026年1月2日 木曜日</p>
          </div>
          <button class="btn btn--secondary">
            <svg class="btn__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>Start Review</span>
          </button>
        </section>

        <!-- Stats Grid -->
        <section class="stats">
          <div class="stats__grid">
            <div class="stat-card stat-card--glow-violet">
              <div class="stat-card__icon stat-card__icon--violet">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="4" width="20" height="16" rx="2"/>
                  <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
              </div>
              <div class="stat-card__content">
                <span class="stat-card__value">24</span>
                <span class="stat-card__label">Review Today</span>
              </div>
            </div>

            <div class="stat-card stat-card--glow-cyan">
              <div class="stat-card__icon stat-card__icon--cyan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <div class="stat-card__content">
                <span class="stat-card__value">7<span class="stat-card__unit">days</span></span>
                <span class="stat-card__label">Current Streak</span>
              </div>
            </div>

            <div class="stat-card stat-card--glow-violet">
              <div class="stat-card__icon stat-card__icon--violet">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                </svg>
              </div>
              <div class="stat-card__content">
                <span class="stat-card__value">156</span>
                <span class="stat-card__label">Total Cards</span>
              </div>
            </div>

            <div class="stat-card stat-card--glow-cyan">
              <div class="stat-card__icon stat-card__icon--cyan">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                  <polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
              </div>
              <div class="stat-card__content">
                <span class="stat-card__value">78<span class="stat-card__unit">%</span></span>
                <span class="stat-card__label">Mastery Rate</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Recent Activity -->
        <section class="activity">
          <div class="activity__header">
            <h2 class="activity__title">Recent Activity</h2>
            <a href="#" class="activity__link">View All</a>
          </div>

          <div class="activity__list">
            <div class="activity__item">
              <div class="activity__icon activity__icon--success">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="activity__content">
                <p class="activity__text">15枚のカードを復習しました</p>
                <p class="activity__time">2時間前</p>
              </div>
              <div class="activity__badge activity__badge--success">+15 XP</div>
            </div>

            <div class="activity__item">
              <div class="activity__icon activity__icon--primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </div>
              <div class="activity__content">
                <p class="activity__text">新しいカードを作成: "React Hooks"</p>
                <p class="activity__time">5時間前</p>
              </div>
              <div class="activity__badge activity__badge--info">New</div>
            </div>

            <div class="activity__item">
              <div class="activity__icon activity__icon--warning">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                </svg>
              </div>
              <div class="activity__content">
                <p class="activity__text">7日間連続学習を達成!</p>
                <p class="activity__time">昨日</p>
              </div>
              <div class="activity__badge activity__badge--warning">Milestone</div>
            </div>

            <div class="activity__item">
              <div class="activity__icon activity__icon--neutral">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/>
                  <line x1="7" y1="7" x2="7.01" y2="7"/>
                </svg>
              </div>
              <div class="activity__content">
                <p class="activity__text">タグを追加: "JavaScript"</p>
                <p class="activity__time">2日前</p>
              </div>
              <div class="activity__badge activity__badge--neutral">Tag</div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');

    menuBtn.addEventListener('click', function() {
      sidebar.classList.toggle('sidebar--open');
      overlay.classList.toggle('sidebar-overlay--visible');
    });

    overlay.addEventListener('click', function() {
      sidebar.classList.remove('sidebar--open');
      overlay.classList.remove('sidebar-overlay--visible');
    });
  </script>
</body>
</html>
