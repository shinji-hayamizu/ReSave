<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="min-h-screen flex flex-col">
    <!-- Header Area -->
    <div class="bg-gradient-to-br from-indigo-600 via-purple-600 to-violet-700 pt-12 pb-24 px-6 rounded-b-[3rem]">
      <div class="max-w-md mx-auto">
        <!-- Back Button -->
        <a href="login.html" class="inline-flex items-center text-white/80 hover:text-white mb-6 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          戻る
        </a>
        <div class="text-center">
          <div class="w-16 h-16 mx-auto bg-white/20 backdrop-blur-sm rounded-2xl flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-white">パスワードリセット</h1>
          <p class="text-white/70 mt-1">登録メールアドレスに再設定リンクを送信します</p>
        </div>
      </div>
    </div>

    <!-- Reset Form -->
    <div class="flex-1 px-6 -mt-12">
      <div class="max-w-md mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8">
          <form class="space-y-5">
            <!-- Email -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">メールアドレス</label>
              <input type="email" placeholder="example@email.com"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
              <p class="text-xs text-gray-500 mt-2">アカウント登録時のメールアドレスを入力してください</p>
            </div>

            <!-- Submit Button -->
            <button type="button" onclick="showSentMessage()"
              class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg shadow-indigo-500/30">
              リセットリンクを送信
            </button>
          </form>

          <!-- Success Message (hidden by default) -->
          <div id="successMessage" class="hidden mt-6 p-4 bg-green-50 border border-green-200 rounded-xl">
            <div class="flex items-start gap-3">
              <div class="w-8 h-8 bg-green-100 rounded-full flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
              </div>
              <div>
                <p class="font-medium text-green-800">メールを送信しました</p>
                <p class="text-sm text-green-600 mt-1">メールボックスを確認し、リンクをクリックしてパスワードを再設定してください。</p>
              </div>
            </div>
          </div>

          <!-- Help Text -->
          <div class="mt-6 p-4 bg-gray-50 rounded-xl">
            <h3 class="font-medium text-gray-800 mb-2">メールが届かない場合</h3>
            <ul class="text-sm text-gray-600 space-y-1">
              <li>・迷惑メールフォルダをご確認ください</li>
              <li>・メールアドレスに誤りがないかご確認ください</li>
              <li>・しばらく待ってから再度お試しください</li>
            </ul>
          </div>
        </div>

        <!-- Back to Login -->
        <p class="text-center mt-6 text-gray-600">
          <a href="login.html" class="text-primary font-semibold hover:text-secondary transition-colors">ログイン画面に戻る</a>
        </p>
      </div>
    </div>

    <!-- Bottom Padding -->
    <div class="h-8"></div>
  </div>

  <script>
    function showSentMessage() {
      document.getElementById('successMessage').classList.remove('hidden');
    }
  </script>
</body>
</html>
