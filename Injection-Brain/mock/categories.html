<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>カテゴリ管理 - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white sticky top-0 z-20 border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="settings.html" class="flex items-center text-gray-600 hover:text-gray-800 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          戻る
        </a>
        <h1 class="text-lg font-bold text-gray-800">カテゴリ管理</h1>
        <button onclick="showAddModal()" class="w-10 h-10 bg-gradient-to-r from-indigo-600 to-purple-600 rounded-full flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-lg mx-auto px-4 py-6">
    <p class="text-sm text-gray-500 mb-4 px-1">ドラッグして並び替えできます</p>

    <!-- Category List -->
    <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
      <!-- Category Item -->
      <div class="flex items-center justify-between p-4 border-b border-gray-100 cursor-move hover:bg-gray-50 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
          </svg>
          <div>
            <p class="font-medium text-gray-800">プログラミング</p>
            <p class="text-sm text-gray-500">45 メモ</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="showEditModal('プログラミング', 'blue')" class="p-2 text-gray-400 hover:text-primary transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button onclick="showDeleteModal('プログラミング')" class="p-2 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category Item -->
      <div class="flex items-center justify-between p-4 border-b border-gray-100 cursor-move hover:bg-gray-50 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 bg-green-500 rounded-full"></div>
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
          </svg>
          <div>
            <p class="font-medium text-gray-800">英語</p>
            <p class="text-sm text-gray-500">32 メモ</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="showEditModal('英語', 'green')" class="p-2 text-gray-400 hover:text-primary transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button onclick="showDeleteModal('英語')" class="p-2 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category Item -->
      <div class="flex items-center justify-between p-4 border-b border-gray-100 cursor-move hover:bg-gray-50 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
          </svg>
          <div>
            <p class="font-medium text-gray-800">資格</p>
            <p class="text-sm text-gray-500">28 メモ</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="showEditModal('資格', 'purple')" class="p-2 text-gray-400 hover:text-primary transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button onclick="showDeleteModal('資格')" class="p-2 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Category Item -->
      <div class="flex items-center justify-between p-4 cursor-move hover:bg-gray-50 transition-colors">
        <div class="flex items-center gap-3">
          <div class="w-3 h-3 bg-orange-500 rounded-full"></div>
          <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8h16M4 16h16"/>
          </svg>
          <div>
            <p class="font-medium text-gray-800">一般知識</p>
            <p class="text-sm text-gray-500">51 メモ</p>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <button onclick="showEditModal('一般知識', 'orange')" class="p-2 text-gray-400 hover:text-primary transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
          </button>
          <button onclick="showDeleteModal('一般知識')" class="p-2 text-gray-400 hover:text-red-500 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Info -->
    <div class="mt-6 p-4 bg-indigo-50 rounded-xl border border-indigo-100">
      <div class="flex items-start gap-3">
        <svg class="w-5 h-5 text-indigo-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>
          <p class="text-sm text-indigo-800 font-medium">カテゴリの使い方</p>
          <p class="text-sm text-indigo-600 mt-1">カテゴリでメモを整理することで、効率的に復習できます。上部の並び順がホーム画面での表示順になります。</p>
        </div>
      </div>
    </div>
  </main>

  <!-- Add/Edit Modal -->
  <div id="editModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full">
      <h3 id="modalTitle" class="text-lg font-bold text-gray-800 mb-4">カテゴリを追加</h3>
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">カテゴリ名</label>
          <input type="text" id="categoryName" placeholder="例: 数学"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">カラー</label>
          <div class="flex gap-3">
            <button type="button" onclick="selectColor('blue')" class="w-8 h-8 bg-blue-500 rounded-full ring-2 ring-offset-2 ring-blue-500"></button>
            <button type="button" onclick="selectColor('green')" class="w-8 h-8 bg-green-500 rounded-full hover:ring-2 hover:ring-offset-2 hover:ring-green-500"></button>
            <button type="button" onclick="selectColor('purple')" class="w-8 h-8 bg-purple-500 rounded-full hover:ring-2 hover:ring-offset-2 hover:ring-purple-500"></button>
            <button type="button" onclick="selectColor('orange')" class="w-8 h-8 bg-orange-500 rounded-full hover:ring-2 hover:ring-offset-2 hover:ring-orange-500"></button>
            <button type="button" onclick="selectColor('red')" class="w-8 h-8 bg-red-500 rounded-full hover:ring-2 hover:ring-offset-2 hover:ring-red-500"></button>
            <button type="button" onclick="selectColor('pink')" class="w-8 h-8 bg-pink-500 rounded-full hover:ring-2 hover:ring-offset-2 hover:ring-pink-500"></button>
          </div>
        </div>
      </form>
      <div class="flex gap-3 mt-6">
        <button onclick="closeEditModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <button onclick="closeEditModal()" class="flex-1 py-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-xl hover:from-indigo-700 hover:to-purple-700 transition-all">
          保存
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-2">カテゴリを削除しますか？</h3>
        <p class="text-gray-600 text-sm">「<span id="deleteCategoryName">プログラミング</span>」カテゴリを削除します。このカテゴリのメモは「未分類」に移動されます。</p>
      </div>
      <div class="flex gap-3">
        <button onclick="closeDeleteModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <button onclick="closeDeleteModal()" class="flex-1 py-3 bg-red-600 text-white rounded-xl hover:bg-red-700 transition-colors">
          削除
        </button>
      </div>
    </div>
  </div>

  <script>
    function showAddModal() {
      document.getElementById('modalTitle').textContent = 'カテゴリを追加';
      document.getElementById('categoryName').value = '';
      document.getElementById('editModal').classList.remove('hidden');
    }

    function showEditModal(name, color) {
      document.getElementById('modalTitle').textContent = 'カテゴリを編集';
      document.getElementById('categoryName').value = name;
      document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.add('hidden');
    }

    function showDeleteModal(name) {
      document.getElementById('deleteCategoryName').textContent = name;
      document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.add('hidden');
    }

    function selectColor(color) {
      // Reset all colors
      // Update selected color styling
    }
  </script>
</body>
</html>
