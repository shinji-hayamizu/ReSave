<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>メモ編集 - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white sticky top-0 z-20 border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="memo-detail.html" class="flex items-center text-gray-600 hover:text-gray-800 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          キャンセル
        </a>
        <h1 class="text-lg font-bold text-gray-800">メモ編集</h1>
        <a href="memo-detail.html"
          class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full text-sm font-medium shadow-lg shadow-indigo-500/20 hover:from-indigo-700 hover:to-purple-700 transition-all">
          保存
        </a>
      </div>
    </div>
  </header>

  <!-- Form -->
  <main class="max-w-lg mx-auto px-4 py-6">
    <form class="space-y-6">
      <!-- Title -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">タイトル</label>
        <input type="text" value="React Hooks の使い方"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
      </div>

      <!-- Category -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">カテゴリ</label>
        <select class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none bg-white">
          <option value="programming" selected>プログラミング</option>
          <option value="english">英語</option>
          <option value="qualification">資格</option>
          <option value="general">一般知識</option>
        </select>
      </div>

      <!-- Question (Front of card) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          質問（カード表面）
          <span class="text-gray-400 font-normal ml-1">必須</span>
        </label>
        <textarea rows="4"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none">useState, useEffect, useContext の違いと使い分けを説明してください。</textarea>
      </div>

      <!-- Answer (Back of card) -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">
          回答（カード裏面）
          <span class="text-gray-400 font-normal ml-1">必須</span>
        </label>
        <textarea rows="8"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none">useState: コンポーネント内で状態を管理するためのフック。シンプルな値の管理に最適。

useEffect: 副作用を扱うためのフック。データ取得、購読、DOM の手動更新などに使用。

useContext: コンテキストを購読するためのフック。プロップスドリリングを避けてグローバルな状態を共有できる。</textarea>
      </div>

      <!-- Tags -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">タグ</label>
        <div class="flex flex-wrap gap-2 mb-3">
          <span class="px-3 py-1 bg-primary/10 text-primary rounded-full text-sm flex items-center gap-1">
            React
            <button type="button" class="hover:text-primary/70">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </span>
          <span class="px-3 py-1 bg-primary/10 text-primary rounded-full text-sm flex items-center gap-1">
            Hooks
            <button type="button" class="hover:text-primary/70">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </button>
          </span>
        </div>
        <div class="relative">
          <input type="text" placeholder="タグを追加..."
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none pr-12">
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-primary hover:text-secondary transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Advanced Options -->
      <div class="pt-4">
        <button type="button" onclick="toggleAdvanced()" class="flex items-center gap-2 text-gray-600 hover:text-gray-800 transition-colors">
          <svg id="advancedIcon" class="w-5 h-5 transform transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
          <span class="text-sm font-medium">詳細オプション</span>
        </button>

        <div id="advancedOptions" class="hidden mt-4 space-y-4 bg-gray-50 rounded-xl p-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">次回復習日</label>
            <input type="date" value="2024-01-25"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none bg-white">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">重要度</label>
            <div class="flex gap-2">
              <button type="button" class="flex-1 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">低</button>
              <button type="button" class="flex-1 py-2 bg-primary text-white rounded-lg">中</button>
              <button type="button" class="flex-1 py-2 border border-gray-200 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors">高</button>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">ステータス</label>
            <select class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none bg-white">
              <option value="learning" selected>学習中</option>
              <option value="mastered">習得済み</option>
              <option value="archived">アーカイブ</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="pt-6 border-t border-gray-200">
        <h3 class="text-sm font-medium text-red-600 mb-3">危険な操作</h3>
        <button type="button" onclick="confirmDelete()"
          class="w-full py-3 border border-red-200 text-red-600 rounded-xl hover:bg-red-50 transition-colors flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
          このメモを削除
        </button>
      </div>
    </form>
  </main>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
          </svg>
        </div>
        <h3 class="text-lg font-bold text-gray-800 mb-2">メモを削除しますか？</h3>
        <p class="text-gray-600 text-sm">この操作は取り消せません。学習履歴も一緒に削除されます。</p>
      </div>
      <div class="flex gap-3">
        <button onclick="closeModal()" class="flex-1 py-3 border border-gray-200 rounded-xl text-gray-600 hover:bg-gray-50 transition-colors">
          キャンセル
        </button>
        <a href="memos.html" class="flex-1 py-3 bg-red-600 text-white rounded-xl text-center hover:bg-red-700 transition-colors">
          削除する
        </a>
      </div>
    </div>
  </div>

  <script>
    function toggleAdvanced() {
      const options = document.getElementById('advancedOptions');
      const icon = document.getElementById('advancedIcon');
      options.classList.toggle('hidden');
      icon.classList.toggle('rotate-180');
    }

    function confirmDelete() {
      document.getElementById('deleteModal').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('deleteModal').classList.add('hidden');
    }
  </script>
</body>
</html>
