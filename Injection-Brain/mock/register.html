<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>新規登録 - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="min-h-screen flex flex-col">
    <!-- Header Area -->
    <div class="bg-gradient-to-br from-indigo-600 via-purple-600 to-violet-700 pt-12 pb-24 px-6 rounded-b-[3rem]">
      <div class="max-w-md mx-auto">
        <!-- Back Button -->
        <a href="login.html" class="inline-flex items-center text-white/80 hover:text-white mb-6 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          戻る
        </a>
        <div class="text-center">
          <h1 class="text-2xl font-bold text-white">アカウント作成</h1>
          <p class="text-white/70 mt-1">学習の旅を始めましょう</p>
        </div>
      </div>
    </div>

    <!-- Register Form -->
    <div class="flex-1 px-6 -mt-12">
      <div class="max-w-md mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-6 md:p-8">
          <form class="space-y-5">
            <!-- Name -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">ユーザー名</label>
              <input type="text" placeholder="ニックネーム"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
            </div>

            <!-- Email -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">メールアドレス</label>
              <input type="email" placeholder="example@email.com"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
            </div>

            <!-- Password -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">パスワード</label>
              <input type="password" placeholder="8文字以上"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
              <p class="text-xs text-gray-500 mt-1">英数字8文字以上で設定してください</p>
            </div>

            <!-- Confirm Password -->
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-2">パスワード（確認）</label>
              <input type="password" placeholder="もう一度入力"
                class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
            </div>

            <!-- Terms -->
            <div class="flex items-start gap-3">
              <input type="checkbox" id="terms" class="mt-1 w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
              <label for="terms" class="text-sm text-gray-600">
                <a href="#" class="text-primary hover:underline">利用規約</a>および<a href="#" class="text-primary hover:underline">プライバシーポリシー</a>に同意します
              </label>
            </div>

            <!-- Register Button -->
            <a href="home.html"
              class="block w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3 rounded-xl font-semibold text-center hover:from-indigo-700 hover:to-purple-700 transition-all shadow-lg shadow-indigo-500/30">
              アカウントを作成
            </a>
          </form>

          <!-- Divider -->
          <div class="relative my-6">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-gray-200"></div>
            </div>
            <div class="relative flex justify-center text-sm">
              <span class="px-4 bg-white text-gray-500">または</span>
            </div>
          </div>

          <!-- Social Register -->
          <div class="space-y-3">
            <button class="w-full flex items-center justify-center gap-3 px-4 py-3 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors">
              <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <span class="text-gray-700 font-medium">Googleで登録</span>
            </button>

            <button class="w-full flex items-center justify-center gap-3 px-4 py-3 bg-black text-white rounded-xl hover:bg-gray-800 transition-colors">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
              </svg>
              <span class="font-medium">Appleで登録</span>
            </button>
          </div>
        </div>

        <!-- Login Link -->
        <p class="text-center mt-6 text-gray-600">
          すでにアカウントをお持ちの方は
          <a href="login.html" class="text-primary font-semibold hover:text-secondary transition-colors">ログイン</a>
        </p>
      </div>
    </div>

    <!-- Bottom Padding -->
    <div class="h-8"></div>
  </div>
</body>
</html>
