<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>衝動チェックイン - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white sticky top-0 z-20 border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="home.html" class="flex items-center text-gray-600 hover:text-gray-800 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          戻る
        </a>
        <h1 class="text-lg font-bold text-gray-800">衝動チェックイン</h1>
        <div class="w-16"></div>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto px-4 py-6 space-y-6">
    <!-- Safety Note -->
    <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-4">
      <p class="text-sm text-indigo-900 font-medium">ここでは「衝動を観察して落ち着く」ことだけを扱います。</p>
      <p class="text-xs text-indigo-900/70 mt-1">他人や自分を傷つけそうなときは、まず安全を最優先にしてください。</p>
    </div>

    <!-- Quick Inputs -->
    <div class="bg-white rounded-2xl shadow-sm p-4 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">いまの衝動（0-10）</label>
        <input id="urge" type="range" min="0" max="10" value="6" class="w-full" oninput="updateValue('urge', 'urgeValue')">
        <div class="flex items-center justify-between text-xs text-gray-500 mt-1">
          <span>0</span>
          <span class="font-semibold text-gray-700">現在: <span id="urgeValue">6</span></span>
          <span>10</span>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">反芻（頭の中で蒸し返す強さ 0-10）</label>
        <input id="rumination" type="range" min="0" max="10" value="7" class="w-full" oninput="updateValue('rumination', 'ruminationValue')">
        <div class="flex items-center justify-between text-xs text-gray-500 mt-1">
          <span>0</span>
          <span class="font-semibold text-gray-700">現在: <span id="ruminationValue">7</span></span>
          <span>10</span>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">トリガー（任意）</label>
          <select class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            <option value="">選択しない</option>
            <option value="work">仕事</option>
            <option value="family">家族</option>
            <option value="relationship">恋愛</option>
            <option value="sns">SNS</option>
            <option value="other">その他</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">発生時刻</label>
          <input type="time" value="18:30" class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">状況メモ（任意）</label>
        <textarea rows="3" placeholder="事実ベースで短く（例: 送った連絡が無視された）"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none resize-none"></textarea>
      </div>
    </div>

    <!-- Cooldown -->
    <div class="bg-white rounded-2xl shadow-sm p-4">
      <h2 class="font-bold text-gray-800 mb-3">いま選べる行動（安全）</h2>
      <div class="grid grid-cols-1 gap-3">
        <button onclick="startCooldown(10)" class="w-full py-4 rounded-2xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold shadow-lg shadow-indigo-500/25">
          10分だけ待つ（遅延タイマー）
        </button>
        <button onclick="showGrounding()" class="w-full py-3 rounded-2xl border border-gray-200 text-gray-700 hover:bg-gray-50 transition-colors">
          60秒グラウンディング（5-4-3-2-1）
        </button>
        <a href="memo-add.html" class="w-full py-3 rounded-2xl border border-gray-200 text-gray-700 text-center hover:bg-gray-50 transition-colors">
          対処カードを作る（メモ追加へ）
        </a>
      </div>

      <div id="grounding" class="hidden mt-4 bg-gray-50 rounded-2xl p-4">
        <p class="text-sm font-medium text-gray-800">5-4-3-2-1（60秒）</p>
        <ul class="text-sm text-gray-600 mt-2 space-y-1">
          <li>5つ: 見えるもの</li>
          <li>4つ: 触れられるもの</li>
          <li>3つ: 聞こえる音</li>
          <li>2つ: 匂い</li>
          <li>1つ: 味</li>
        </ul>
      </div>

      <div id="timer" class="hidden mt-4 bg-indigo-50 border border-indigo-100 rounded-2xl p-4">
        <div class="flex items-center justify-between">
          <p class="text-sm font-medium text-indigo-900">遅延タイマー</p>
          <p class="text-sm font-bold text-indigo-900"><span id="remaining">10:00</span></p>
        </div>
        <p class="text-xs text-indigo-900/70 mt-1">終わったら衝動/反芻をもう一度だけ計測します。</p>
      </div>
    </div>

    <!-- Save -->
    <div class="pb-10">
      <a href="home.html"
        class="block w-full py-4 rounded-2xl bg-white border border-gray-200 text-center font-semibold text-gray-800 hover:bg-gray-50 transition-colors">
        記録してホームへ戻る
      </a>
    </div>
  </main>

  <script>
    function updateValue(inputId, outputId) {
      const el = document.getElementById(inputId);
      document.getElementById(outputId).textContent = el.value;
    }

    function showGrounding() {
      document.getElementById('grounding').classList.toggle('hidden');
    }

    let intervalId = null;
    function startCooldown(minutes) {
      const timerEl = document.getElementById('timer');
      timerEl.classList.remove('hidden');

      let remaining = minutes * 60;
      const remainingEl = document.getElementById('remaining');

      if (intervalId) clearInterval(intervalId);

      intervalId = setInterval(() => {
        remaining -= 1;
        const m = String(Math.floor(remaining / 60)).padStart(2, '0');
        const s = String(remaining % 60).padStart(2, '0');
        remainingEl.textContent = `${m}:${s}`;

        if (remaining <= 0) {
          clearInterval(intervalId);
          intervalId = null;
          remainingEl.textContent = `00:00`;
          alert('タイマー終了。衝動/反芻をもう一度計測してみましょう。');
        }
      }, 1000);
    }
  </script>
</body>
</html>
