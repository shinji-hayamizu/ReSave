<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール編集 - Injection-Brain</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#6366f1',
            secondary: '#8b5cf6',
            accent: '#a78bfa',
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white sticky top-0 z-20 border-b border-gray-100">
    <div class="max-w-lg mx-auto px-4 py-4">
      <div class="flex items-center justify-between">
        <a href="settings.html" class="flex items-center text-gray-600 hover:text-gray-800 transition-colors">
          <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
          </svg>
          戻る
        </a>
        <h1 class="text-lg font-bold text-gray-800">プロフィール</h1>
        <a href="settings.html"
          class="px-4 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-full text-sm font-medium shadow-lg shadow-indigo-500/20 hover:from-indigo-700 hover:to-purple-700 transition-all">
          保存
        </a>
      </div>
    </div>
  </header>

  <!-- Content -->
  <main class="max-w-lg mx-auto px-4 py-6">
    <!-- Avatar Section -->
    <div class="text-center mb-8">
      <div class="relative inline-block">
        <div class="w-24 h-24 bg-gradient-to-br from-indigo-500 to-purple-500 rounded-full flex items-center justify-center text-white text-3xl font-bold">
          田
        </div>
        <button class="absolute bottom-0 right-0 w-8 h-8 bg-white rounded-full shadow-lg flex items-center justify-center border border-gray-200 hover:bg-gray-50 transition-colors">
          <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>
      </div>
      <p class="text-sm text-gray-500 mt-3">タップして写真を変更</p>
    </div>

    <!-- Form -->
    <form class="space-y-6">
      <!-- Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">表示名</label>
        <input type="text" value="田中太郎"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">メールアドレス</label>
        <input type="email" value="tanaka@example.com"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
        <p class="text-xs text-gray-500 mt-1">変更後は確認メールが送信されます</p>
      </div>

      <!-- Stats (Read Only) -->
      <div class="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-2xl p-4 border border-indigo-100">
        <h3 class="font-medium text-gray-800 mb-4">学習統計</h3>
        <div class="grid grid-cols-2 gap-4">
          <div class="bg-white rounded-xl p-3 text-center">
            <p class="text-2xl font-bold text-primary">156</p>
            <p class="text-xs text-gray-500">総カード数</p>
          </div>
          <div class="bg-white rounded-xl p-3 text-center">
            <p class="text-2xl font-bold text-primary">42</p>
            <p class="text-xs text-gray-500">連続学習日数</p>
          </div>
          <div class="bg-white rounded-xl p-3 text-center">
            <p class="text-2xl font-bold text-green-600">85%</p>
            <p class="text-xs text-gray-500">平均正答率</p>
          </div>
          <div class="bg-white rounded-xl p-3 text-center">
            <p class="text-2xl font-bold text-purple-600">1,247</p>
            <p class="text-xs text-gray-500">総復習回数</p>
          </div>
        </div>
      </div>

      <!-- Account Type -->
      <div class="bg-white rounded-2xl p-4 border border-gray-200">
        <div class="flex items-center justify-between">
          <div>
            <div class="flex items-center gap-2">
              <h3 class="font-medium text-gray-800">Premium プラン</h3>
              <span class="px-2 py-0.5 bg-primary/10 text-primary text-xs rounded-full">有効</span>
            </div>
            <p class="text-sm text-gray-500 mt-1">2024年12月31日まで</p>
          </div>
          <button class="text-primary text-sm font-medium hover:text-secondary transition-colors">
            プラン管理
          </button>
        </div>
      </div>

      <!-- Connected Accounts -->
      <div>
        <h3 class="text-sm font-medium text-gray-700 mb-3">連携アカウント</h3>
        <div class="bg-white rounded-2xl border border-gray-200 overflow-hidden">
          <div class="flex items-center justify-between p-4 border-b border-gray-100">
            <div class="flex items-center gap-3">
              <svg class="w-6 h-6" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              <div>
                <p class="font-medium text-gray-800">Google</p>
                <p class="text-sm text-green-600">連携済み</p>
              </div>
            </div>
            <button class="text-red-500 text-sm font-medium hover:text-red-600 transition-colors">
              解除
            </button>
          </div>
          <div class="flex items-center justify-between p-4">
            <div class="flex items-center gap-3">
              <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
              </svg>
              <div>
                <p class="font-medium text-gray-800">Apple</p>
                <p class="text-sm text-gray-500">未連携</p>
              </div>
            </div>
            <button class="text-primary text-sm font-medium hover:text-secondary transition-colors">
              連携する
            </button>
          </div>
        </div>
      </div>

      <!-- Password Change -->
      <div>
        <h3 class="text-sm font-medium text-gray-700 mb-3">パスワード変更</h3>
        <div class="space-y-4">
          <input type="password" placeholder="現在のパスワード"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
          <input type="password" placeholder="新しいパスワード"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
          <input type="password" placeholder="新しいパスワード（確認）"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none">
        </div>
      </div>

      <!-- Danger Zone -->
      <div class="pt-6 border-t border-gray-200">
        <h3 class="text-sm font-medium text-red-600 mb-3">アカウント削除</h3>
        <p class="text-sm text-gray-500 mb-4">
          アカウントを削除すると、すべてのデータが完全に削除されます。この操作は取り消せません。
        </p>
        <button type="button"
          class="w-full py-3 border border-red-200 text-red-600 rounded-xl hover:bg-red-50 transition-colors">
          アカウントを削除
        </button>
      </div>
    </form>
  </main>
</body>
</html>
