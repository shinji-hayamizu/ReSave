<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Stats Page Specific Styles */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 480px) {
      .stats-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }
    }

    .stats-grid__item {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: 16px;
      text-align: center;
    }

    .stats-grid__value {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .stats-grid__value--primary {
      color: var(--color-primary);
    }

    .stats-grid__value--success {
      color: var(--color-success);
    }

    .stats-grid__value--warning {
      color: var(--color-warning);
    }

    .stats-grid__unit {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .stats-grid__label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Chart Area */
    .chart-card {
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 20px;
    }

    .chart-card__title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .chart-placeholder {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 8px;
      height: 160px;
      padding: 0 8px;
    }

    .chart-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .chart-bar__fill {
      width: 100%;
      max-width: 40px;
      background: var(--color-primary);
      border-radius: 4px 4px 0 0;
      transition: height var(--transition-normal);
    }

    .chart-bar__label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .chart-bar__value {
      font-size: 10px;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Cumulative Stats */
    .cumulative-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 480px) {
      .cumulative-stats {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    .cumulative-stat {
      background: var(--bg-primary);
      border-radius: var(--border-radius);
      padding: 16px;
      text-align: center;
      border: 1px solid var(--border-color);
    }

    .cumulative-stat__icon {
      width: 24px;
      height: 24px;
      color: var(--color-primary);
      margin-bottom: 8px;
    }

    .cumulative-stat__value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .cumulative-stat__unit {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .cumulative-stat__label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Section Title */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
      margin-top: 24px;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }
  </style>
</head>
<body class="content-body">
  <!--
    画面: 統計
    機能: F-030
    参照仕様: docs/requirements/functions/stats/F-030-daily-stats.md
    前の画面: index.html (サイドバーから)
    次の画面: index.html (戻る)
  -->

  <!-- [Component: StatsPage] -->
  <div class="content-wrapper" data-component="StatsPage">

    <!-- ========================================
         [Component: TodaySummary]
         今日のサマリー
         ======================================== -->
    <div class="summary-card" data-component="TodaySummary" style="margin-top: 24px;">
      <div class="summary-card__title">今日の学習</div>
      <div class="stats-grid" data-props="todayStats">
        <div class="stats-grid__item">
          <div class="stats-grid__value stats-grid__value--primary" data-prop="reviewedCount">15<span class="stats-grid__unit">枚</span></div>
          <div class="stats-grid__label">学習カード数</div>
        </div>
        <div class="stats-grid__item">
          <div class="stats-grid__value stats-grid__value--success" data-prop="accuracyRate">87<span class="stats-grid__unit">%</span></div>
          <div class="stats-grid__label">正答率</div>
        </div>
        <div class="stats-grid__item">
          <div class="stats-grid__value" data-prop="timeSpentMinutes">12<span class="stats-grid__unit">分</span></div>
          <div class="stats-grid__label">学習時間</div>
        </div>
        <div class="stats-grid__item">
          <div class="stats-grid__value stats-grid__value--warning" data-prop="currentStreak">7<span class="stats-grid__unit">日</span></div>
          <div class="stats-grid__label">連続学習日数</div>
        </div>
      </div>
    </div>
    <!-- [/Component: TodaySummary] -->

    <!-- ========================================
         [Component: PeriodTabs]
         期間切替タブ
         ======================================== -->
    <div class="tabs" data-component="PeriodTabs" data-props="activePeriod">
      <button
        class="tab active"
        data-tab="period-today"
        data-action="onClick:setActivePeriod('today')"
      >
        今日
      </button>
      <button
        class="tab"
        data-tab="period-week"
        data-action="onClick:setActivePeriod('week')"
      >
        週間
      </button>
      <button
        class="tab"
        data-tab="period-month"
        data-action="onClick:setActivePeriod('month')"
      >
        月間
      </button>
    </div>
    <!-- [/Component: PeriodTabs] -->

    <!-- ========================================
         [Component: StatsChart]
         統計グラフエリア
         ======================================== -->
    <div class="chart-card" data-component="StatsChart">
      <div class="chart-card__title">日別学習カード数（過去7日）</div>
      <div class="chart-placeholder" data-props="dailyStats">
        <!-- [ListItem: ChartBar] -->
        <div class="chart-bar" data-list-item data-key="date">
          <div class="chart-bar__value">10</div>
          <div class="chart-bar__fill" style="height: 50%;" data-prop="height"></div>
          <div class="chart-bar__label">月</div>
        </div>
        <!-- [/ListItem: ChartBar] -->
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">15</div>
          <div class="chart-bar__fill" style="height: 75%;"></div>
          <div class="chart-bar__label">火</div>
        </div>
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">8</div>
          <div class="chart-bar__fill" style="height: 40%;"></div>
          <div class="chart-bar__label">水</div>
        </div>
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">20</div>
          <div class="chart-bar__fill" style="height: 100%;"></div>
          <div class="chart-bar__label">木</div>
        </div>
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">12</div>
          <div class="chart-bar__fill" style="height: 60%;"></div>
          <div class="chart-bar__label">金</div>
        </div>
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">5</div>
          <div class="chart-bar__fill" style="height: 25%;"></div>
          <div class="chart-bar__label">土</div>
        </div>
        <div class="chart-bar" data-list-item>
          <div class="chart-bar__value">15</div>
          <div class="chart-bar__fill" style="height: 75%;"></div>
          <div class="chart-bar__label">日</div>
        </div>
      </div>
    </div>
    <!-- [/Component: StatsChart] -->

    <!-- ========================================
         [Component: CumulativeStats]
         累計統計
         ======================================== -->
    <div class="section-title">累計統計</div>
    <div class="cumulative-stats" data-component="CumulativeStats" data-props="summary">
      <div class="cumulative-stat">
        <svg class="cumulative-stat__icon" data-icon="lucide:Layers" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/><path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/><path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/></svg>
        <div class="cumulative-stat__value" data-prop="totalCards">156<span class="cumulative-stat__unit">枚</span></div>
        <div class="cumulative-stat__label">総カード数</div>
      </div>
      <div class="cumulative-stat">
        <svg class="cumulative-stat__icon" data-icon="lucide:RotateCcw" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        <div class="cumulative-stat__value" data-prop="totalReviews">1,234<span class="cumulative-stat__unit">回</span></div>
        <div class="cumulative-stat__label">総復習回数</div>
      </div>
      <div class="cumulative-stat">
        <svg class="cumulative-stat__icon" data-icon="lucide:Flame" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>
        <div class="cumulative-stat__value" data-prop="longestStreak">14<span class="cumulative-stat__unit">日</span></div>
        <div class="cumulative-stat__label">最長ストリーク</div>
      </div>
      <div class="cumulative-stat">
        <svg class="cumulative-stat__icon" data-icon="lucide:Target" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        <div class="cumulative-stat__value" data-prop="averageAccuracy">82<span class="cumulative-stat__unit">%</span></div>
        <div class="cumulative-stat__label">平均正答率</div>
      </div>
    </div>
    <!-- [/Component: CumulativeStats] -->

  </div>
  <!-- [/Component: StatsPage] -->

  <script src="js/main.js"></script>
</body>
</html>
