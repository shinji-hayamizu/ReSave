<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>パスワードリセット - ReSave</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Auth Card Layout - Center aligned form without sidebar */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: var(--bg-secondary);
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-primary);
      border-radius: var(--border-radius-lg);
      box-shadow: var(--shadow-lg);
      padding: 40px;
    }

    .auth-card__logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .auth-card__logo-icon {
      width: 40px;
      height: 40px;
      color: var(--color-primary);
    }

    .auth-card__logo-text {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .auth-card__title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
    }

    .auth-card__description {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .auth-card__form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .auth-card__footer {
      margin-top: 24px;
      text-align: center;
    }

    .auth-card__link {
      color: var(--color-primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color var(--transition-fast);
    }

    .auth-card__link:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    /* Success State */
    .auth-card__success {
      text-align: center;
    }

    .auth-card__success-icon {
      width: 64px;
      height: 64px;
      color: var(--color-success);
      margin: 0 auto 16px;
    }

    .auth-card__success-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .auth-card__success-message {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 8px;
    }

    .auth-card__success-email {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .auth-card__help {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      padding: 12px 16px;
      border-radius: var(--border-radius);
      margin-bottom: 24px;
    }

    .auth-card__actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* State visibility */
    [data-state="sent"] {
      display: none;
    }

    .auth-card--sent [data-state="form"] {
      display: none;
    }

    .auth-card--sent [data-state="sent"] {
      display: block;
    }
  </style>
</head>
<body>
  <!--
    画面: パスワードリセット
    機能: F-003
    参照仕様: docs/requirements/functions/auth/F-003-password-reset.md
    前の画面: login.html
    次の画面: login.html (リセット完了時)
  -->

  <!-- [Component: PasswordResetPage] -->
  <div class="auth-page" data-component="PasswordResetPage">
    <div class="auth-card" data-component="PasswordResetCard" id="password-reset-card">

      <!-- Logo -->
      <div class="auth-card__logo">
        <svg class="auth-card__logo-icon" data-icon="lucide:BookOpen" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
          <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
        </svg>
        <span class="auth-card__logo-text">ReSave</span>
      </div>

      <!-- ========================================
           [State: form] リセットリンク送信フォーム（デフォルト表示）
           ======================================== -->
      <div data-state="form">
        <!-- [Component: PasswordResetForm] -->
        <div data-component="PasswordResetForm">
          <h1 class="auth-card__title">パスワードリセット</h1>
          <p class="auth-card__description">
            登録済みのメールアドレスを入力してください。<br>
            パスワードリセット用のリンクをお送りします。
          </p>

          <form class="auth-card__form" data-action="onSubmit:handlePasswordReset" id="password-reset-form">
            <div class="form-group">
              <label class="form-label" for="email">メールアドレス</label>
              <input
                type="email"
                id="email"
                class="form-input"
                placeholder="登録したメールアドレスを入力"
                required
                data-prop="email"
                data-action="onChange:setEmail"
              >
              <!-- [State: error] E-F003-01 -->
              <p class="form-error" data-show-if="emailError" style="display: none;">
                有効なメールアドレスを入力してください
              </p>
            </div>

            <button type="submit" class="btn btn--primary btn--block" data-action="onClick:handleSubmit">
              リセットリンクを送信
            </button>
          </form>

          <div class="auth-card__footer">
            <a href="login.html" class="auth-card__link" data-action="onClick:navigateToLogin">
              ログインに戻る
            </a>
          </div>
        </div>
        <!-- [/Component: PasswordResetForm] -->
      </div>

      <!-- ========================================
           [State: sent] 送信完了画面
           ======================================== -->
      <div data-state="sent">
        <!-- [Component: PasswordResetSent] -->
        <div class="auth-card__success" data-component="PasswordResetSent">
          <svg class="auth-card__success-icon" data-icon="lucide:MailCheck" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12c0 1.1.9 2 2 2h8"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            <path d="m16 19 2 2 4-4"/>
          </svg>

          <h2 class="auth-card__success-title">メールを送信しました</h2>
          <p class="auth-card__success-message">
            パスワードリセット用のリンクを送信しました。<br>
            メールをご確認ください。
          </p>
          <p class="auth-card__success-email" data-prop="sentEmail" id="sent-email">
            example@email.com
          </p>

          <div class="auth-card__help">
            メールが届かない場合は、迷惑メールフォルダをご確認ください。
          </div>

          <div class="auth-card__actions">
            <button type="button" class="btn btn--secondary btn--block" data-action="onClick:handleResend" id="resend-btn">
              再送信
            </button>
            <a href="login.html" class="btn btn--primary btn--block" data-action="onClick:navigateToLogin">
              ログインに戻る
            </a>
          </div>
        </div>
        <!-- [/Component: PasswordResetSent] -->
      </div>

    </div>
  </div>
  <!-- [/Component: PasswordResetPage] -->

  <script src="js/main.js"></script>
  <script>
    // Password Reset Page Logic
    (function() {
      const card = document.getElementById('password-reset-card');
      const form = document.getElementById('password-reset-form');
      const emailInput = document.getElementById('email');
      const sentEmailDisplay = document.getElementById('sent-email');
      const resendBtn = document.getElementById('resend-btn');
      const errorMessage = document.querySelector('.form-error');

      // Email validation
      function isValidEmail(email) {
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        return emailRegex.test(email);
      }

      // Show error
      function showError() {
        if (errorMessage) {
          errorMessage.style.display = 'block';
        }
      }

      // Hide error
      function hideError() {
        if (errorMessage) {
          errorMessage.style.display = 'none';
        }
      }

      // Switch to sent state
      function showSentState(email) {
        card.classList.add('auth-card--sent');
        if (sentEmailDisplay) {
          sentEmailDisplay.textContent = email;
        }
      }

      // Handle form submission
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();

          const email = emailInput.value.trim();

          if (!isValidEmail(email)) {
            showError();
            return;
          }

          hideError();

          // Simulate sending email (in real app, this would call an API)
          showSentState(email);
        });
      }

      // Clear error on input
      if (emailInput) {
        emailInput.addEventListener('input', function() {
          hideError();
        });
      }

      // Handle resend
      if (resendBtn) {
        resendBtn.addEventListener('click', function() {
          // Simulate resend (in real app, this would call an API)
          resendBtn.textContent = '送信中...';
          resendBtn.disabled = true;

          setTimeout(function() {
            resendBtn.textContent = '再送信しました';
            setTimeout(function() {
              resendBtn.textContent = '再送信';
              resendBtn.disabled = false;
            }, 2000);
          }, 1000);
        });
      }
    })();
  </script>
</body>
</html>
