<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background:#f0f4f8; font-family:'Helvetica Neue', Arial, sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0f4f8; padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,0.08);">

          <!-- Header -->
          <tr>
            <td style="background:#4a90e2; padding:32px 40px;">
              <p style="margin:0; color:#ffffff; font-size:22px; font-weight:700; letter-spacing:-0.3px;">ReSave</p>
              <p style="margin:4px 0 0; color:rgba(255,255,255,0.8); font-size:13px;">記憶を、もっと効率よく。</p>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="padding:40px 40px 32px;">
              <h1 style="margin:0 0 16px; font-size:24px; color:#1a202c; font-weight:700;">パスワードのリセット</h1>
              <p style="margin:0 0 12px; font-size:15px; color:#4a5568; line-height:1.7;">
                パスワードリセットのリクエストを受け付けました。
              </p>
              <p style="margin:0 0 28px; font-size:15px; color:#4a5568; line-height:1.7;">
                下のボタンをクリックして、新しいパスワードを設定してください。
              </p>
              <a href="{{ .ConfirmationURL }}" style="display:inline-block; background:#4a90e2; color:#ffffff; text-decoration:none; padding:14px 32px; border-radius:8px; font-size:15px; font-weight:600;">
                パスワードをリセット
              </a>
              <p style="margin:28px 0 0; font-size:13px; color:#718096; line-height:1.7;">
                このリクエストに心当たりがない場合は、このメールを無視してください。<br>
                リンクの有効期限は <strong>1時間</strong> です。
              </p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f7fafc; padding:24px 40px; border-top:1px solid #e2e8f0;">
              <p style="margin:0; font-size:12px; color:#a0aec0; text-align:center;">
                © 2026 ReSave
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
