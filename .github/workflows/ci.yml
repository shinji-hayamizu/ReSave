name: CI

on:
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Lint, TypeCheck, Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: TypeCheck
        working-directory: apps/web
        run: npx tsc --noEmit
      - name: Test
        working-directory: apps/web
        run: pnpm test -- --run
